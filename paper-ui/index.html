// Mode switch (检索 / 八股 / 面试). Mutually exclusive but all cancellable;
// none lit = default agent. Re-clicking the active toggle deactivates it.
async function setChatMode(mode) {
  if (chatMode === mode) {
    // Re-click already active → cancel back to default
    if (mode === 'baguwen' || mode === 'interview' || mode === 'yuan') await exitChatMode();
    else exitToBase();  // generate → agent: lightweight, no clear
    return;
  }
  if (mode === 'baguwen') {
    if (!currentFile) {
      addChatMessage(currentLang === 'zh' ? '请先在左侧打开一个知识章节，再开始八股。' : 'Please open a knowledge chapter from the sidebar before starting baguwen.', 'system');
      return;
    }
    if (chatMode === 'baguwen' || chatMode === 'interview' || chatMode === 'yuan') await exitChatMode();
    await enterChatMode('baguwen');
    return;
  }
  if (mode === 'interview') {
    if (chatMode === 'baguwen' || chatMode === 'yuan') await exitChatMode();
    await enterChatMode('interview');
    return;
  }
  if (mode === 'yuan') {
    // 元 skill 不要求打开章节；从任何互动模式互斥进入。
    if (chatMode === 'baguwen' || chatMode === 'interview') await exitChatMode();
    await enterChatMode('yuan');
    return;
  }
  // mode === 'generate'
  if (chatMode === 'baguwen' || chatMode === 'interview' || chatMode === 'yuan') await exitChatMode();
  chatMode = 'generate';
  updateModeToggleUI();
  updateChatActionsVisibility();
  showSearchReadyMessageIfEmpty();
}

function exitToBase() {
  chatMode = 'agent';
  updateModeToggleUI();
  updateChatActionsVisibility();
  clearSearchReadyMessage();
}

// Stop only the in-flight baguwen/interview *turn* before leaving its page — scoped to
// that turn's task id so background 补充 tasks and generate tasks keep running.
// (Layered with the poll's session_id filter, which drops any straggler reply.)
async function abortIfInteractiveInFlight() {
  if (activeThinkingBubble && interactiveMsgId) {
    try {
      await fetch(BASE + '/api/abort', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ task_id: interactiveMsgId }),
      });
    } catch {}
  }
}

// Archive current page → open a fresh, isolated page for `mode` (§1.5).
async function enterChatMode(mode) {
  await abortIfInteractiveInFlight();
  await archiveCurrentChat();
  try { await fetch(BASE + '/api/clear', { method: 'POST' }); } catch {}

  chatSessionStartTime = Date.now();
  chatMode = mode;
  chatSessionId = genSessionId();
  chatTranscript = [];
  activeThinkingBubble = null;
  interactiveMsgId = null;
  pendingBaguwenOpening = false;

  // Keep background tasks (generate / 补充) running and visible in 进度; only
  // drop finished cards so the panel doesn't accumulate stale history.
  pruneBackgroundTasks();

  const container = document.getElementById('chatMessages');
  container.innerHTML = '';
  updateModeToggleUI();
  updateChatActionsVisibility();
  document.getElementById('chatInput').value = '';

  if (mode === 'baguwen') {
    addChatMessage(currentLang === 'zh' ? '八股模式已就绪，Agent 将基于当前页面出题考察。' : 'Baguwen mode is ready. The agent will quiz you based on the current page.', 'system');
    pendingBaguwenOpening = true;
    sendInteractive('__BAGUWEN_START__', { silentUser: true });
  } else if (mode === 'interview') {
    addChatMessage(currentLang === 'zh' ? '面试模式已就绪。上传简历、粘贴岗位需求后即可开始。' : 'Interview mode is ready. Upload your resume and paste the job description to begin.', 'system');
  } else if (mode === 'yuan') {
    addChatMessage(currentLang === 'zh' ? '元 skill 已就绪，将帮你新建或修改工作区 skill。' : 'Yuan Skill mode is ready. Create or modify a workspace skill.', 'system');
    // 开场由服务端 prompt 让 Agent 先问「新建 / 修改」，前端无需额外分流（D2）。
    sendInteractive('__YUAN_START__', { silentUser: true });
  }
  switchPanel('chat');
}

async function exitChatMode() {
  if (chatMode !== 'baguwen' && chatMode !== 'interview' && chatMode !== 'yuan') return;
  await abortIfInteractiveInFlight();
  await archiveCurrentChat();
  chatMode = 'agent';
  chatSessionId = genSessionId();
  chatTranscript = [];
  activeThinkingBubble = null;
  interactiveMsgId = null;
  pendingBaguwenOpening = false;
  pruneBackgroundTasks();  // keep running generate/补充 cards in 进度
  const container = document.getElementById('chatMessages');
  container.innerHTML = '';
  chatSessionStartTime = Date.now();
  updateModeToggleUI();
  updateChatActionsVisibility();
  switchPanel('chat');
}

let thinkingTimer = null;
function addThinkingBubble() {
  const container = document.getElementById('chatMessages');

    if (!activeThinkingBubble) { clearInterval(thinkingTimer); thinkingTimer = null; return; }
    const el = activeThinkingBubble.querySelector('.thinking-elapsed');
    if (el) el.textContent = ' · ' + Math.floor((Date.now() - t0) / 1000) + 's';
  }, 1000);
}

// Map a backend milestone line to a light Chinese status (null = keep "思考中").
function thinkingStatusFor(content) {
  const c = (content || '').toLowerCase();
  if (c.includes('web search')) return '正在联网检索';
  if (c.startsWith('reading') || c.includes('analyzing')) return '正在分析内容';
  if (c.includes('skills/')) return '正在调用技能';
  if (c.includes('created') || c.includes('generated')) return '正在生成文件';
  if (c.includes('started processing')) return '正在处理';
  return null;
}

// ── Selection bubble over the knowledge iframe (same-origin) ──
let selBubbleEl = null;
let pendingSelection = '';

function getSelBubble() {
  if (selBubbleEl) return selBubbleEl;
  const el = document.createElement('div');
  el.className = 'sel-bubble';
  el.textContent = '➕ 用这段内容提问';
  el.addEventListener('mousedown', (e) => e.preventDefault()); // don't collapse selection
  el.addEventListener('click', onSelBubbleClick);
  document.body.appendChild(el);
  selBubbleEl = el;
  return el;
}

function hideSelBubble() { if (selBubbleEl) selBubbleEl.classList.remove('visible'); }

function onSelBubbleClick() {
  const sel = (pendingSelection || '').trim();
  hideSelBubble();
  if (!sel) return;
  const inp = document.getElementById('chatInput');
  inp.value = (inp.value ? inp.value + '\n' : '') + '关于这段内容：”' + sel + '” ';
  inp.focus();
}

// Attach selection listeners to the freshly-loaded iframe document.
function attachSelectionListener() {
  const iframe = document.querySelector('#viewportContent iframe');
  if (!iframe) return;
  let doc;
  try { doc = iframe.contentDocument; } catch { return; }
  if (!doc) return;
  doc.addEventListener('mouseup', () => setTimeout(() => showSelectionBubble(iframe), 0));
  doc.addEventListener('selectionchange', () => {
    const s = doc.getSelection();
    if (!s || s.isCollapsed || !s.toString().trim()) hideSelBubble();
  });
  doc.addEventListener('scroll', hideSelBubble, true);
}

function showSelectionBubble(iframe) {
  let doc, sel;
  try { doc = iframe.contentDocument; sel = doc.getSelection(); } catch { return; }
  if (!sel || sel.isCollapsed) { hideSelBubble(); return; }
  const text = sel.toString().trim();
  if (!text) { hideSelBubble(); return; }
  const rect = sel.getRangeAt(0).getBoundingClientRect();
  if (!rect || (rect.width === 0 && rect.height === 0)) { hideSelBubble(); return; }
  const frameRect = iframe.getBoundingClientRect();
  pendingSelection = text;
  const bubble = getSelBubble();
  bubble.style.left = (frameRect.left + rect.left + rect.width / 2) + 'px';
  bubble.style.top = (frameRect.top + rect.top - 8) + 'px';
  bubble.classList.add('visible');
}

// Hide the bubble when interacting with the parent UI (iframe-internal events
// don't bubble to the parent, so selecting inside the iframe is unaffected).
document.addEventListener('mousedown', (e) => {
  if (selBubbleEl && e.target !== selBubbleEl) hideSelBubble();
});

function resolveThinkingBubble(finalText) {
  stopThinkingTimer();
  const container = document.getElementById('chatMessages');
  if (activeThinkingBubble) {
    activeThinkingBubble.classList.remove('thinking');
    setRenderedContent(activeThinkingBubble, finalText);   // Markdown + math
    attachMessageActions(activeThinkingBubble);            // copy button
    activeThinkingBubble = null;

    addChatMessage(finalText, 'agent');

  if (chatMode === 'baguwen') {
    if (pendingBaguwenOpening) pendingBaguwenOpening = false;
    else addBaguwenCompletionButton();
  } else if (chatMode === 'interview') {
    addInterviewKBButton();
  } else if (chatMode === 'agent') {
    addAgentCompletionButton();
  }
  container.scrollTop = container.scrollHeight;
}

// Modal offering two ways to land a completion: new supplement note, or append

  return new Promise(resolve => {
    closeModal();
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.onclick = (e) => { if (e.target === overlay) { overlay.remove(); resolve(null); } };
    overlay.innerHTML = `
      <div class="modal" style="max-width:420px;">
        <div class="modal-header">
          <h3>完善知识点</h3>
          <button class="modal-close">✕</button>
        </div>
        <div class="modal-body">
          <p style="margin:0 0 12px;font-size:14px;">将把本次${source}提炼出的补充内容加入 ${chapter}。请选择方式：</p>
          <div class="completion-option-cards">
            <div class="completion-option-card" id="optNew">
              <div class="completion-option-title">新建补充笔记</div>

            </div>
            <div class="completion-option-card" id="optAppend">
              <div class="completion-option-title">补充到原始笔记</div>
              <div class="completion-option-desc">将内容追加到当前打开的笔记末尾并重新渲染</div>
            </div>
          </div>
        </div>

async function triggerCompletion(completeMode, btnEl) {
  const chapter = chapterFolder(currentFile);
  const source = completeMode === 'baguwen_complete' ? '八股'
               : completeMode === 'interview_kb_complete' ? '面试'
               : completeMode === 'agent_complete' ? '对话' : '补充';
  const sourceEn = completeMode === 'baguwen_complete' ? 'Baguwen'
                 : completeMode === 'interview_kb_complete' ? 'Interview'
                 : completeMode === 'agent_complete' ? 'Chat' : 'Supplement';

  const choice = await showCompletionOptionsModal(source, chapter);
  if (!choice) return;

  const isAppend = (choice === 'append');
  const actualMode = isAppend
    ? completeMode.replace('_complete', '_append_complete')
    : completeMode;

  // Dispatch as a background task. The transcript is snapshotted into the request
  // (context injected), so the job is self-contained and the user can keep doing
  // 八股 while it runs in 进度. Two 补充 tasks queue server-side (one at a time).
  try {
    const resp = await fetch(BASE + '/api/message', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        content: isAppend ? '请据本次对话内容补充到原始笔记中'
                          : completeMode === 'baguwen_complete' ? '请据八股盲点完善知识点'
                          : completeMode === 'interview_kb_complete' ? '请据面试内容提取知识点'
                          : '请据本次对话完善知识点',
        current_file: currentFile,
        mode: actualMode,
        history: chatTranscript.slice(),
        session_id: chatSessionId,
      }),
    });
    const data = await resp.json();
    if (!data.ok) {
      addChatMessage((currentLang === 'zh' ? '完善失败：' : 'Completion failed: ') + (data.error || 'Unknown'), 'system');
      return;
    }
    // Register the background task and surface it as a Progress card (abort lives
    // on the card via the standard per-task stop button).
    const taskId = data.id;
    completionTaskIds.add(taskId);
    completionMeta[taskId] = { isAppend, source, chapter, file: currentFile };
    showProgressCard(source + '补充 · ' + chapter, 'claude', taskId);

    if (btnEl) { btnEl.disabled = true; btnEl.textContent = '✓ 已提交到进度'; }
    addChatMessage(currentLang === 'zh'
      ? '”' + source + '补充”任务已在后台开始，可在「进度」查看进度并随时中止；其间可继续' + source + '。'
      : 'The “' + sourceEn + ' Completion” task has started in the background. Check the Progress tab to monitor or stop it.', 'system');
    switchPanel('progress');
  } catch {
    addChatMessage(currentLang === 'zh' ? '完善失败：服务器不可达。' : 'Completion failed: server unreachable.', 'system');
  }
}

// Handle outbox events for a background 补充 task (routed by task id, so it is
// independent of the current chat session — survives mode/chapter switches).
function handleCompletionEvent(msg, routeId) {
  if (msg.type === 'progress') {
    if (msg.status === 'started') {
      addMilestone(msg.content, null, null, routeId);
      updatePhase('initializing', msg.content, routeId);
    } else if (msg.status === 'milestone') {
      const phase = (msg.meta && msg.meta.phase) || inferPhase(msg.content, routeId);
      updatePhase(phase, msg.content, routeId);
      addMilestone(msg.content, null, null, routeId);
    }
    return;  // running heartbeat: ignore
  }
  if (msg.type !== 'agent_response') return;

  const meta = msg.meta || {};
  const info = completionMeta[routeId] || {};
  if (msg.status === 'completed') {
    addMilestone('Finished (' + formatElapsed(msg.elapsed || 0) + ')', null, 'finished', routeId);
    finishProgressCard('completed', routeId);
    const isAppend = !!meta.append_mode || !!info.isAppend;
    addCompletionResultMessage({
      isAppend,
      source: info.source || '',
      newFiles: meta.new_files || [],
      backupFiles: isAppend ? (meta.backup_files || []) : [],
      modifiedFiles: isAppend ? (meta.modified_files || []) : [],
    });
    refreshNavTree();
  } else {
    addMilestone('Error: ' + (msg.content || '').substring(0, 60), null, 'error-dot', routeId);
    finishProgressCard('error', routeId);
    addChatMessage((currentLang === 'zh' ? '补充失败：' : 'Supplement failed: ') + (msg.content || '').substring(0, 200), 'system');
  }
  completionTaskIds.delete(routeId);
  delete completionMeta[routeId];
}

    : (currentLang === 'zh' ? '补充笔记已加入该章节，可在左侧导航树查看。' : 'Supplementary note added to the chapter. View it in the sidebar.');
  const canWithdraw = isAppend ? (backupFiles && backupFiles.length > 0)

// Undo a completion. New-note: delete the .supplement files. Append: restore the
// original from the .bak backups via the server.
async function withdrawCompletion(wdBtn, completionBtn, info) {
  const { newFiles, isAppend, backupFiles } = info;
  const msg = isAppend
    ? '将恢复原始笔记到修改前的状态（从备份恢复），此操作不可再次撤回。确定？'
    : '将删除刚生成的补充笔记文件，此操作不可恢复。确定撤回？';
  const ok = await showConfirmModal('撤回补充笔记', msg);
  if (!ok) return;

  wdBtn.disabled = true;
  wdBtn.title = '撤回中…';
  try {
    if (isAppend) {
      const resp = await fetch(BASE + '/api/completion-withdraw', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ mode: 'restore_backup', backup_files: backupFiles }),
      });
      const data = await resp.json();
      if (!data.ok) throw new Error((data.errors && data.errors.join('; ')) || data.error || 'restore failed');
    } else {
      for (const f of newFiles) {
        const relPath = f.startsWith('knowledge/') ? f.slice('knowledge/'.length) : f;
        await fetch(BASE + '/api/knowledge-note', {
          method: 'DELETE',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ file: relPath }),
        });
      }
    }
    wdBtn.innerHTML = CHECK_ICON_SVG;  // icon button → show a check, keep borderless
    wdBtn.title = '已撤回';
    wdBtn.disabled = true;
    if (completionBtn) completionBtn.textContent = '已撤回笔记';
    addChatMessage(currentLang === 'zh' ? '补充笔记已撤回。' : 'Supplementary notes withdrawn.', 'system');
    refreshNavTree();
  } catch (err) {
    wdBtn.title = '撤回失败，点击重试';
    wdBtn.disabled = false;
    addChatMessage((currentLang === 'zh' ? '撤回失败：' : 'Withdrawal failed: ') + (err.message || err), 'system');
  }
}

// Send one baguwen/interview turn. opts.silentUser hides the user bubble (baguwen开场).
async function sendInteractive(text, opts) {
  opts = opts || {};
  if (!opts.silentUser) {
    const attachments = uploadedFiles.map(f => ({ name: f.name, size: f.size }));
    addChatMessage(text, 'user', attachments);
    chatTranscript.push({ role: 'user', text });
    debouncedSaveConversation();
  }
  addThinkingBubble();
  try {
    const payload = {
      content: text,
      current_file: currentFile,
      mode: chatMode,
      history: chatTranscript.slice(),
      selection: opts.selection || '',
      session_id: chatSessionId,
      uploaded_pdf: getLastUploadedPdf(),
    };
    if (chatMode === 'interview') {
      payload.interview_difficulty = ivDifficulty;
      payload.interview_round = ivRound;
    }
    const resp = await fetch(BASE + '/api/message', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    const data = await resp.json();
    if (data.ok) {
      interactiveMsgId = data.id;
      clearUploadState();
    } else {
      resolveThinkingBubble('Error: ' + (data.error || 'Unknown'));
    }
  } catch (err) {
    resolveThinkingBubble('服务器不可达，请确认 server.py 在运行。');
  }
}

async function sendMessage() {
  // baguwen (八股), interview (面试), yuan (元 skill), and agent (默认) use the conversational send path.
  if (chatMode === 'baguwen' || chatMode === 'yuan' || chatMode === 'agent') {
    const input = document.getElementById('chatInput');
    const text = input.value.trim();
    if (!text) return;
    if (activeThinkingBubble) return;
    input.value = '';
    sendInteractive(text, { selection: '' });
    return;
  }
  if (chatMode === 'interview') {
    const input = document.getElementById('chatInput');
    let text = input.value.trim();
    // An empty send means "开始面试". The backend reads the uploaded resume / JD
    // as input materials and opens with an overview + 第1题; if nothing was
    // provided it first asks for the target role. Either way we send the start
    // token so the opening turn is never mistaken for an interview answer.
    if (!text) text = '__INTERVIEW_START__';
    if (activeThinkingBubble) return;
    input.value = '';
    sendInteractive(text, { selection: '' });
    return;
  }
  const btn = document.getElementById('sendBtn');
  if (btn.disabled) return;
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text) return;

  btn.disabled = true;
  const attachments = uploadedFiles.map(f => ({ name: f.name, size: f.size }));
  addChatMessage(text, 'user', attachments);
  input.value = '';

  try {
    const resp = await fetch(BASE + '/api/message', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        content: text,
        current_file: currentFile,
        uploaded_pdf: getLastUploadedPdf(),
        mode: chatMode,
      }),
    });
    const data = await resp.json();
    if (data.ok) {
      clearUploadState();
      const title = text.substring(0, 60) + (text.length > 60 ? '...' : '');
      const msgId = data.id;
      ownedMsgIds.add(msgId);
      addChatMessage('Agent is processing your request. Check the Progress tab for live updates.', 'system');
      showProgressCard(title, activeAgent || 'agent', msgId);
      addMilestone('Request sent', null, null, msgId);
      addWorkingIndicator(msgId);
      switchPanel('progress');
    } else {
      addChatMessage('Error: ' + (data.error || 'Unknown'), 'system');
    }
  } catch (err) {
    addChatMessage('Server unreachable. Is server.py running?', 'system');
  } finally {
    btn.disabled = false;
  }
}

document.addEventListener('keydown', function(e) {
  if (e.target.id === 'chatInput' && e.key === 'Enter') {
    // enterToSend=true (default): Enter sends, Shift+Enter newlines.
    // enterToSend=false: Shift+Enter sends, Enter newlines.
    const shouldSend = enterToSend ? !e.shiftKey : e.shiftKey;
    if (shouldSend) {
      e.preventDefault();
      sendMessage();
    }
  }
});

// ── Clear Chat (New Conversation) ──
async function clearChat() {
  // Check if agent is running and confirm with count
  const runningTasks = taskList.filter(t => t.status === 'running');
  if (runningTasks.length > 0) {
    const confirmed = await showConfirmModal('New Chat',
      `${runningTasks.length} task(s) running. Starting a new chat will stop all. Continue?`);
    if (!confirmed) return;
    try { await fetch(BASE + '/api/abort', { method: 'POST' }); } catch {}
  }
  // Also stop any in-flight conversational turn (agent/baguwen/interview).
  await abortIfInteractiveInFlight();

  // 0. Archive current conversation (persist + detach activeConversationId)
  await archiveCurrentChat();

  // 1. Call backend to delete inbox + outbox files
  try {
    await fetch(BASE + '/api/clear', { method: 'POST' });
  } catch {}

  // 2. Reset all frontend state — keep seenOutboxFiles so lingering agent
  //    output from the old session is not re-processed; use timestamp to
  //    reject any new outbox files written by a still-running old agent.
  chatSessionStartTime = Date.now();
  uploadedFiles = [];
  sessionUploadedPdf = null;
  activeAgent = null;
  stopProgressTimer();  // stops all timers

  // New Chat always returns to the default agent page.
  chatMode = 'agent';
  chatSessionId = genSessionId();
  chatTranscript = [];
  activeThinkingBubble = null;
  interactiveMsgId = null;
  completionTaskIds = new Set();  // New Chat aborts & forgets background 补充 tasks
  completionMeta = {};
  updateModeToggleUI();
  updateChatActionsVisibility();

  // 3. Clear chat UI
  const chatContainer = document.getElementById('chatMessages');
  chatContainer.innerHTML = '';

  // 4. Clear progress UI
  taskList = [];
  activeTaskId = null;
  ownedMsgIds = new Set();
  resetStepProgress();
  const section = document.getElementById('progressSection');
  section.querySelectorAll('.task-block').forEach(b => b.remove());
  document.getElementById('progressEmpty').style.display = '';

  // 5. Clear upload result
  const uploadResult = document.getElementById('uploadResult');
  uploadResult.textContent = '';
  uploadResult.classList.remove('visible');

  // 6. Clear text input
  document.getElementById('chatInput').value = '';

  // 7. Switch to chat panel
  switchPanel('chat');
}

function clearUploadState() {

function removeUploadedFile(index) {

    const input = document.getElementById('chatInput');
    if (input.value.includes('personalize skill') || input.value.includes('研究路径')) {
      input.value = '';
    }
  }
}

function getFileExt(name) {
  const m = name.match(/\.([a-zA-Z0-9]+)$/);
  return m ? m[1].toLowerCase() : '';
}

function getExtClass(ext) {
  if (ext === 'pdf') return 'ext-pdf';
  if (['doc','docx'].includes(ext)) return 'ext-doc';
  if (['xls','xlsx','csv'].includes(ext)) return 'ext-xls';
  if (['ppt','pptx'].includes(ext)) return 'ext-ppt';
  if (['png','jpg','jpeg','gif','svg','webp'].includes(ext)) return 'ext-img';
  return 'ext-txt';
}

function fileIconSvg(size) {
  return '<svg width="' + size + '" height="' + size + '" viewBox="0 0 32 40" fill="none">'
    + '<path d="M2 4C2 1.79 3.79 0 6 0H20L30 10V36C30 38.21 28.21 40 26 40H6C3.79 40 2 38.21 2 36V4Z" fill="#F5F3F0"/>'
    + '<path d="M20 0L30 10H24C21.79 10 20 8.21 20 6V0Z" fill="#E0DCD6"/>'
    + '</svg>';
}

function renderUploadResult() {
  const result = document.getElementById('uploadResult');
  if (uploadedFiles.length === 0) {
    result.innerHTML = '';
    result.classList.remove('visible');
    return;
  }
  const cancelTitle = currentLang === 'zh' ? '移除' : 'Remove';
  result.innerHTML = uploadedFiles.map((f, i) => {
    const ext = getFileExt(f.name);
    const extCls = getExtClass(ext);
    const sizeStr = f.size >= 1048576
      ? (f.size / 1048576).toFixed(1) + ' MB'
      : (f.size / 1024).toFixed(1) + ' KB';
    return '<div class="upload-file-card">'
      + '<div class="file-icon-wrap">'
      + fileIconSvg(24)
      + (ext ? '<span class="file-icon-ext ' + extCls + '">' + ext + '</span>' : '')
      + '</div>'
      + '<div class="file-info">'
      + '<span class="file-info-name">' + escapeHtml(f.name) + '</span>'
      + '<span class="file-info-size">' + sizeStr + '</span>'
      + '</div>'
      + '<button class="file-remove-btn" onclick="removeUploadedFile(' + i + ')" title="' + cancelTitle + '">'
      + '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">'
      + '<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>'
      + '</button>'
      + '</div>';
  }).join('');
  result.classList.add('visible');
}

document.getElementById('pdfUpload').addEventListener('change', async function(e) {
  const files = Array.from(e.target.files);
  if (!files.length) return;

  for (const file of files) {
    const result = document.getElementById('uploadResult');
    result.textContent = 'Uploading ' + file.name + '...';
    result.classList.add('visible');
    try {
      const formData = new FormData();
      formData.append('file', file);
      const resp = await fetch(BASE + '/api/upload', { method: 'POST', body: formData });
      const data = await resp.json();
      if (data.ok) {
        uploadedFiles.push({ name: data.filename, size: data.size });
        sessionUploadedPdf = data.filename;
        renderUploadResult();
        addMilestone('PDF uploaded: ' + data.filename);
        if (chatMode === 'generate' && uploadedFiles.length === 1) {
          const resumePromptZh = '请分析上传的简历"' + data.filename + '"，创建一个综合性的个性化知识章节，'
            + '整合 personalize skill 中所有适用的研究路径（A/B/C/D）。对每条路径进行联网检索，'
            + '然后将所有内容综合到 knowledge/ 下的一个统一草稿文件中。不要按路径分别创建文件。';
          const resumePromptEn = 'Please analyze the uploaded resume "' + data.filename + '" and create ONE comprehensive '
            + 'personalized knowledge chapter that integrates all applicable research paths (A/B/C/D) '
            + 'from the personalize skill. Research online for each path, then synthesize everything '
            + 'into a single consolidated draft file under knowledge/. Do NOT create separate files per path.';
          const input = document.getElementById('chatInput');
          input.value = currentLang === 'zh' ? resumePromptZh : resumePromptEn;
          input.focus();
        }
      } else {
        addChatMessage('Upload failed: ' + (data.error || 'Unknown'), 'system');
      }
    } catch (err) {

    }
  }
  this.value = '';
});

function formatTime(date) {
  return date.getHours().toString().padStart(2, '0') + ':' +
         date.getMinutes().toString().padStart(2, '0');
}

function formatElapsed(seconds) {
  const m = Math.floor(seconds / 60);
  const s = Math.floor(seconds % 60);
  return m > 0 ? `${m}m ${s}s` : `${s}s`;
}

function startProgressTimer(taskId) {
  progressStartTimes[taskId] = Date.now();
  if (progressTimers[taskId]) clearInterval(progressTimers[taskId]);
  progressTimers[taskId] = setInterval(() => {
    const st = progressStartTimes[taskId];
    if (!st) return;
    const block = document.querySelector(`.task-block[data-task-id="${taskId}"]`);
    if (!block) return;
    const el = block.querySelector('.task-elapsed');
    if (el) el.textContent = formatElapsed((Date.now() - st) / 1000);
  }, 1000);
}

function stopProgressTimer(taskId) {
  if (taskId) {
    if (progressTimers[taskId]) { clearInterval(progressTimers[taskId]); delete progressTimers[taskId]; }
    delete progressStartTimes[taskId];
  } else {
    Object.keys(progressTimers).forEach(k => clearInterval(progressTimers[k]));
    progressTimers = {};
    progressStartTimes = {};
  }
}

function generateStepNodesHTML() {
  const phaseLabels = {
    initializing: '初始化',
    searching: '联网检索',
    analyzing: '内容分析',
    generating: '生成内容',
    indexing: '更新索引',
  };
  return PHASES.map(p => `
    <div class="step-node pending" data-phase="${p}">
      <div class="step-header">
        <span class="step-icon"></span>
        <span class="step-label">${phaseLabels[p]}</span>
      </div>
    </div>
  `).join('');
}

function renderNewTaskCard(taskId, title, agent) {

        <button class="btn-stop-agent" onclick="stopSingleTask('${taskId}')" title="Stop this task">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="11" fill="none"/><rect x="7.5" y="7.5" width="9" height="9" rx="1.5" stroke="none"/></svg>
        </button>

// Drop finished task cards (and their timers) but keep running background tasks,
// so generate/补充 keep streaming into 进度 across chat-session switches.
function pruneBackgroundTasks() {
  taskList.filter(t => t.status !== 'running').forEach(t => {
    const block = document.querySelector(`.task-block[data-task-id="${t.id}"]`);
    if (block) block.remove();
    stopProgressTimer(t.id);
  });
  taskList = taskList.filter(t => t.status === 'running');
  const runningIds = new Set(taskList.map(t => t.id));
  ownedMsgIds = new Set([...ownedMsgIds].filter(id => runningIds.has(id)));
  if (!runningIds.has(activeTaskId)) activeTaskId = null;
  if (taskList.length === 0) {
    const empty = document.getElementById('progressEmpty');
    if (empty) empty.style.display = '';
  }
}

function showProgressCard(title, agent, taskId) {
  document.getElementById('progressEmpty').style.display = 'none';

  taskList.push({
    id: taskId,
    title: title || 'Processing...',
    agent: agent || 'agent',
    startTime: Date.now(),
    milestoneCount: 0,
    status: 'running',
  });
  activeTaskId = taskId;
  taskPhaseState[taskId] = { currentPhase: null, phaseStats: {} };

  renderNewTaskCard(taskId, title, agent);
  startProgressTimer(taskId);
}

function finishProgressCard(status, taskId) {
  const tid = taskId || activeTaskId;
  stopProgressTimer(tid);
  if (status === 'completed') {
    completeAllSteps(tid);
  } else {
    errorCurrentStep(tid);
  }
  const task = taskList.find(t => t.id === tid);
  if (task) task.status = status === 'completed' ? 'completed' : 'error';
  const card = document.querySelector(`.task-block[data-task-id="${tid}"] .progress-task-card`);
  if (card) card.classList.add('task-completed');
  delete taskPhaseState[tid];
}

function collapseTaskTimeline(taskId) {
  const block = document.querySelector(`.task-block[data-task-id="${taskId}"]`);
  if (!block) return;
  const wrapper = block.querySelector('.task-timeline-wrapper');
  if (wrapper) wrapper.classList.add('collapsed');
}

function toggleTaskTimeline(taskId) {
  const block = document.querySelector(`.task-block[data-task-id="${taskId}"]`);
  if (!block) return;
  const wrapper = block.querySelector('.task-timeline-wrapper');
  if (wrapper) wrapper.classList.toggle('collapsed');
}

function getTaskTimeline(taskId) {
  const tid = taskId || activeTaskId;
  if (!tid) return null;
  const block = document.querySelector(`.task-block[data-task-id="${tid}"]`);
  if (!block) return null;
  return block.querySelector('.progress-timeline');
}

function getMilestoneCategory(text) {
  if (/^web search:/i.test(text)) return 'search';
  if (/^mcp:/i.test(text)) return 'tool';
  if (/^Agent \(/i.test(text)) return 'lifecycle';
  if (/^(Finished|Completed)/i.test(text)) return 'done';
  if (/^(Error|error|Failed)/i.test(text)) return 'error';
  if (/^(wrote|Created|Generated)/i.test(text)) return 'file';
  if (/^(Reading|Analyzing|Extracting|Parsing|Summarizing|Processing)/i.test(text)) return 'analysis';
  if (/^Request sent/i.test(text)) return 'sent';
  return 'default';
}

function addMilestone(text, timeStr, dotClass, taskId) {
  const tid = taskId || activeTaskId;
  const timeline = getTaskTimeline(tid);
  if (!timeline) return;
  const t = timeStr || formatTime(new Date());
  document.getElementById('progressEmpty').style.display = 'none';

  const working = timeline.querySelector('.milestone-dot.working');
  if (working) working.closest('.milestone-item').remove();

  const cat = getMilestoneCategory(text);
  const catClass = cat !== 'default' ? ' cat-' + cat : '';
  const finalDotClass = dotClass ? ' ' + dotClass : catClass;

  const item = document.createElement('div');
  item.className = 'milestone-item';
  item.innerHTML = `
    <span class="milestone-dot${finalDotClass}"></span>
    <span class="milestone-text">${escapeHtml(text)}</span>
    <span class="milestone-time">${t}</span>
  `;
  timeline.appendChild(item);
  timeline.scrollTop = timeline.scrollHeight;

  const task = taskList.find(t => t.id === tid);
  if (task) {
    task.milestoneCount++;
    const block = document.querySelector(`.task-block[data-task-id="${tid}"]`);
    if (block) {
      const countEl = block.querySelector('.task-milestone-count');
      if (countEl) countEl.textContent = task.milestoneCount + ' items';
    }
  }
}

function addWorkingIndicator(taskId) {
  const timeline = getTaskTimeline(taskId || activeTaskId);
  if (!timeline) return;
  if (timeline.querySelector('.milestone-dot.working')) return;
  const item = document.createElement('div');
  item.className = 'milestone-item';
  item.innerHTML = `
    <span class="milestone-dot working"></span>
    <span class="milestone-text" style="color:var(--paper-text-secondary)">Working...</span>
    <span class="milestone-time"></span>
  `;
  timeline.appendChild(item);
}

// ══════════════════════════════════════
// Step Progress Tree
// ══════════════════════════════════════

const PHASES = ['initializing', 'searching', 'analyzing', 'generating', 'indexing'];

const STEP_ICONS = {
  pending: '',
  active:  '<svg width="10" height="10" viewBox="0 0 10 10" fill="none"><circle cx="5" cy="5" r="3" fill="white"/></svg>',
  completed: '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>',
  error: '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>',
};

function inferPhase(milestoneText, taskId) {
  const state = taskPhaseState[taskId] || {};
  if (/^Agent \(/i.test(milestoneText)) return 'initializing';
  if (/^web search:/i.test(milestoneText)) return 'searching';
  if (/^mcp:/i.test(milestoneText)) return 'searching';
  if (/^(Reading|Analyzing|Extracting|Parsing|Summarizing|Processing)/i.test(milestoneText)) return 'analyzing';
  if (/^(I'll |I found |I'm going to |Next, )/i.test(milestoneText)) return 'analyzing';
  if (/^(python3 skills\/|wrote|Created|Generated)/i.test(milestoneText)) return 'generating';
  if (/INDEX_KB/i.test(milestoneText)) return 'indexing';
  if (/^Finished/i.test(milestoneText)) return null;
  if (state.currentPhase === 'searching' && state.phaseStats.searching && state.phaseStats.searching.count >= 3) {
    return 'analyzing';
  }
  return null;
}

function getTaskBlock(taskId) {
  const tid = taskId || activeTaskId;
  if (!tid) return null;
  return document.querySelector(`.task-block[data-task-id="${tid}"]`);
}

function updatePhase(newPhase, milestoneText, taskId) {
  const tid = taskId || activeTaskId;
  const block = getTaskBlock(tid);
  if (!block) return;

  const state = taskPhaseState[tid];
  if (!state) return;

  const statsPhase = newPhase || state.currentPhase;
  if (statsPhase && milestoneText) {
    state.phaseStats[statsPhase] = state.phaseStats[statsPhase] || { count: 0, items: [] };
    state.phaseStats[statsPhase].count++;
    const shortText = extractSubItemText(milestoneText, statsPhase);
    if (shortText) {
      state.phaseStats[statsPhase].items.push(shortText);
      renderSubItems(statsPhase, tid);
    }
    updateStepBadge(statsPhase, tid);
  }

  if (!newPhase || newPhase === state.currentPhase) return;

  const newIdx = PHASES.indexOf(newPhase);
  if (newIdx < 0) return;

  const currentIdx = state.currentPhase ? PHASES.indexOf(state.currentPhase) : -1;
  if (newIdx <= currentIdx) return;

  const oldPhase = state.currentPhase;
  state.currentPhase = newPhase;

  PHASES.forEach((p, i) => {
    const node = block.querySelector(`.step-node[data-phase="${p}"]`);
    if (!node) return;
    const icon = node.querySelector('.step-icon');

    if (p === newPhase || p === oldPhase) {
      icon.classList.add('transitioning');
      setTimeout(() => icon.classList.remove('transitioning'), 150);
    }

    node.classList.remove('active', 'completed', 'pending', 'error');
    if (i < newIdx) {
      node.classList.add('completed');
      icon.innerHTML = STEP_ICONS.completed;
    } else if (i === newIdx) {
      node.classList.add('active');
      icon.innerHTML = STEP_ICONS.active;
    } else {
      node.classList.add('pending');
      icon.innerHTML = STEP_ICONS.pending;
    }
  });
}

function extractSubItemText(text, phase) {
  if (phase === 'searching') {
    const m = text.match(/^web search:\s*(?:https?:\/\/)?(.+)/i);
    if (m) return m[1].substring(0, 45);
    const m2 = text.match(/^web search:\s*(.+)/i);
    if (m2) return m2[1].substring(0, 45);
  }
  if (phase === 'generating') {
    const m = text.match(/(?:wrote|Created|Generated)\s+(?:knowledge\/)?(.+)/i);
    if (m) return m[1].substring(0, 45);
  }
  return null;
}

function renderSubItems(phase, taskId) {
  const tid = taskId || activeTaskId;
  const block = getTaskBlock(tid);
  if (!block) return;
  const node = block.querySelector(`.step-node[data-phase="${phase}"]`);
  if (!node) return;
  let content = node.querySelector('.step-content');
  if (!content) {
    content = document.createElement('div');
    content.className = 'step-content';
    node.appendChild(content);
  }

  const state = taskPhaseState[tid];
  const stats = state && state.phaseStats[phase];
  if (!stats) return;
  const maxVisible = 5;
  content.innerHTML = '';

  const visibleItems = stats.items.slice(-maxVisible);
  visibleItems.forEach(item => {
    const el = document.createElement('div');
    el.className = 'step-sub-item';
    el.textContent = item;
    content.appendChild(el);
  });

  if (stats.items.length > maxVisible) {
    const overflow = document.createElement('div');
    overflow.className = 'step-sub-overflow';
    overflow.textContent = `... and ${stats.items.length - maxVisible} more`;
    content.insertBefore(overflow, content.firstChild);
  }
}

function updateStepBadge(phase, taskId) {
  const tid = taskId || activeTaskId;
  const block = getTaskBlock(tid);
  if (!block) return;
  const node = block.querySelector(`.step-node[data-phase="${phase}"]`);
  if (!node) return;
  const state = taskPhaseState[tid];
  const stats = state && state.phaseStats[phase];
  if (!stats) return;

  let badge = node.querySelector('.step-badge');
  if (!badge) {
    badge = document.createElement('span');
    badge.className = 'step-badge';
    node.querySelector('.step-header').appendChild(badge);
  }

  if (phase === 'searching')  badge.textContent = `${stats.count} searches`;
  if (phase === 'generating') badge.textContent = `${stats.count} files`;
  if (phase === 'analyzing')  badge.textContent = `${stats.count} items`;
}

function completeAllSteps(taskId) {
  const block = getTaskBlock(taskId);
  if (!block) return;

  PHASES.forEach((p, i) => {
    const node = block.querySelector(`.step-node[data-phase="${p}"]`);
    if (!node) return;

    setTimeout(() => {
      const icon = node.querySelector('.step-icon');
      icon.classList.add('transitioning');
      setTimeout(() => {
        node.classList.remove('active', 'pending');
        node.classList.add('completed');
        icon.innerHTML = STEP_ICONS.completed;
        icon.classList.remove('transitioning');
      }, 150);
    }, i * 80);
  });
}

function errorCurrentStep(taskId) {
  const block = getTaskBlock(taskId);
  if (!block) return;
  const activeNode = block.querySelector('.step-node.active');
  if (activeNode) {
    const icon = activeNode.querySelector('.step-icon');
    icon.classList.add('transitioning');
    setTimeout(() => {
      activeNode.classList.remove('active');
      activeNode.classList.add('error');
      icon.innerHTML = STEP_ICONS.error;
      icon.classList.remove('transitioning');
    }, 150);
  }
}

  taskPhaseState = {};

// Agent Status Polling
// ══════════════════════════════════════

async function pollAgentStatus() {
  try {
    const resp = await fetch(BASE + '/api/status');
    const data = await resp.json();
    if (!data.messages || data.messages.length === 0) return;

    for (const msg of data.messages) {
      if (seenOutboxFiles.has(msg._file)) continue;
      seenOutboxFiles.add(msg._file);

      const routeId = msg.reply_to || null;

      // ── Background tasks (补充 / generate): routed by task id, so they are
      //    independent of the chat session and survive mode/chapter switches.
      //    They bypass the chat-session timestamp filter below. ──
      if (routeId && completionTaskIds.has(routeId)) {
        handleCompletionEvent(msg, routeId);
        continue;
      }
      const isBgGenerate = routeId && ownedMsgIds.has(routeId);

      // Reject stale chat events from before the current chat session (background
      // task events are exempt — handled above / below by their own routing).
      if (!isBgGenerate && msg.timestamp
          && new Date(msg.timestamp).getTime() < chatSessionStartTime) continue;

      // ── baguwen / interview / agent: belong to the current chat page ──
      const mMode = (msg.meta && msg.meta.mode) || null;
      const mSession = (msg.meta && msg.meta.session_id) || null;
      // Drop any event whose session_id doesn't match the page we're on now.
      // This is the isolation guard: a slow answer that lands after
      // the user already left for another page must NOT render here. (Legacy
      // events without a session_id fall back to the old behaviour.)
      const sessionMismatch = mMode && mSession && mSession !== chatSessionId;
      if (mMode === 'baguwen' || mMode === 'interview' || mMode === 'yuan' || mMode === 'agent') {
        if (sessionMismatch) continue;
        if (msg.type === 'progress' && msg.status === 'milestone') {
          updateThinkingBubble(thinkingStatusFor(msg.content));
        } else if (msg.type === 'agent_response') {
          const text = msg.content || '(无输出)';
          resolveThinkingBubble(text);
          chatTranscript.push({ role: 'agent', text });
          debouncedSaveConversation();
          // C2: 元 skill 修改了现有 skill（带 .bak 备份）→ 给出「撤回本次修改」入口。
          const meta = msg.meta || {};
          if (mMode === 'yuan' && meta.backup_files && meta.backup_files.length > 0) {
            addYuanWithdrawMessage(meta);
          }
        }
        continue;
      }

      // ── generate events: route by reply_to (== msg_id == task card id) ──
      // Drop events not owned by this chat session (BUG-1 isolation)
      if (routeId && !ownedMsgIds.has(routeId)) continue;

      if (msg.type === 'progress') {
        if (msg.status === 'started') {
          // 'started' from backend — card already created by sendMessage using
          // the same msg_id. Just absorb the milestone into the existing card.
          const existingTask = taskList.find(t => t.id === routeId);
          if (existingTask && existingTask.status === 'running') {
            addMilestone(msg.content, null, null, routeId);
            updatePhase('initializing', msg.content, routeId);
          }
        } else if (msg.status === 'milestone') {
          const phase = (msg.meta && msg.meta.phase) || inferPhase(msg.content, routeId);
          updatePhase(phase, msg.content, routeId);
          addMilestone(msg.content, null, null, routeId);
        } else if (msg.status === 'running') {
          // heartbeat — no action needed
        }
      } else if (msg.type === 'agent_response') {
        if (msg.raw_output) {
          addAgentSummaryMessage(msg.content, msg.raw_output);
        } else {
          const role = msg.status === 'error' ? 'system' : 'agent';
          addChatMessage(msg.content, role);
        }

        if (msg.status === 'completed') {
          addMilestone('Finished (' + formatElapsed(msg.elapsed || 0) + ')', null, 'finished', routeId);
          finishProgressCard('completed', routeId);
          refreshNavTree();
          if (msg.meta && msg.meta.new_chapters && msg.meta.new_chapters.length > 0) {
            addMilestone('New: ' + msg.meta.new_chapters.join(', '), null, null, routeId);
          }
        } else {
          addMilestone('Error: ' + msg.content.substring(0, 60), null, 'error-dot', routeId);
          finishProgressCard('error', routeId);
        }

        // Only auto-switch to chat if no other tasks are still running
        const stillRunning = taskList.some(t => t.status === 'running');
        if (!stillRunning) setTimeout(() => switchPanel('chat'), 800);
      } else if (msg.type === 'error') {
        addChatMessage(msg.content, 'system');
        if (routeId && taskList.find(t => t.id === routeId)) {
          addMilestone('Error: ' + msg.content.substring(0, 60), null, 'error-dot', routeId);
          finishProgressCard('error', routeId);
        }
        const stillRunning = taskList.some(t => t.status === 'running');
        if (!stillRunning) setTimeout(() => switchPanel('chat'), 800);
      }
    }
  } catch {}
}

function positionPopover(panel) {

  const pw = parseInt(panel.style.width) || 340;
  panel.style.bottom = (window.innerHeight - rect.top + 8) + 'px';
  panel.style.left = (rect.left + (rect.width - pw) / 2) + 'px';
}

function closePopover(anchor) {
  const panel = anchor.querySelector('.popover-panel');

}

function closeModal() {

function showConfirmModal(title, message) {
  return new Promise(resolve => {
    closeModal();
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.onclick = (e) => { if (e.target === overlay) { overlay.remove(); resolve(false); } };
    overlay.innerHTML = `
      <div class="modal" style="max-width:380px;">
        <div class="modal-header">
          <h3>${title}</h3>
          <button class="modal-close" onclick="this.closest('.modal-overlay').remove()">✕</button>
        </div>
        <div class="modal-body"><p style="margin:0;font-size:14px;">${message}</p></div>
        <div class="modal-footer" style="display:flex;gap:8px;justify-content:flex-end;">
          <button class="btn btn-sm" id="confirmNo">Cancel</button>
          <button class="btn btn-sm" id="confirmYes" style="background:#e74c3c;color:#fff;border:none;">Confirm</button>
        </div>
      </div>`;
    document.body.appendChild(overlay);
    overlay.querySelector('#confirmNo').onclick = () => { overlay.remove(); resolve(false); };
    overlay.querySelector('#confirmYes').onclick = () => { overlay.remove(); resolve(true); };
  });
}

async function stopSingleTask(taskId) {
  const task = taskList.find(t => t.id === taskId && t.status === 'running');
  if (!task) return;
  const confirmed = await showConfirmModal('Stop Task', 'Stop this task?');
  if (!confirmed) return;
  try {
    await fetch(BASE + '/api/abort', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ task_id: taskId }),
    });
  } catch {}
  finishProgressCard('error', taskId);
  addMilestone('Stopped by user', null, 'error-dot', taskId);
  // If this was a background 补充 task, forget it (no result will arrive).
  if (completionTaskIds.has(taskId)) {
    completionTaskIds.delete(taskId);
    delete completionMeta[taskId];
    addChatMessage(currentLang === 'zh' ? '已中止补充任务。' : 'Completion task stopped.', 'system');
  } else {
    addChatMessage('Task stopped by user.', 'system');
  }
}

async function stopAgent() {
  const runningTasks = taskList.filter(t => t.status === 'running');
  if (runningTasks.length === 0) return;
  const confirmed = await showConfirmModal('Stop All',
    `${runningTasks.length} task(s) running. Stop all?`);
  if (!confirmed) return;
  try { await fetch(BASE + '/api/abort', { method: 'POST' }); } catch {}
  runningTasks.forEach(t => {
    finishProgressCard('error', t.id);
    addMilestone('Stopped by user', null, 'error-dot', t.id);
  });
  addChatMessage('All tasks stopped by user.', 'system');
}

window.addEventListener('beforeunload', (e) => {
  const hasRunning = taskList.some(t => t.status === 'running');
  if (hasRunning) {
    e.preventDefault();
    navigator.sendBeacon(BASE + '/api/abort');
  }
});

function collectStep2() {
  const topic = document.getElementById('saTopic');
  saState.answers.topic = topic ? topic.value.trim() : '';

  if (saState.type === 'direction') {
    saState.answers.timeRange = getSelectedChip('saTimeRange') || '近1年';
    saState.answers.paperCount = getSelectedChip('saPaperCount') || '3';
    saState.answers.venue = getSelectedChip('saVenue') || '不限';
  } else if (saState.type === 'citation') {
    saState.answers.focus = getSelectedChips('saFocus');
  } else {
    const baseline = document.getElementById('saBaseline');
    saState.answers.baseline = baseline ? baseline.value.trim() : '';
    saState.answers.dimensions = getSelectedChips('saDimensions');
  }
}

function collectStep3() {
  saState.answers.outputFormat = getSelectedChip('saOutputFormat') || '全部包含';
  saState.answers.depth = getSelectedChip('saDepth') || '中级教程';
  saState.answers.relatedChapters = getSelectedChips('saRelated');
}

function getSelectedChip(groupId) {
  const group = document.getElementById(groupId);
  if (!group) return null;
  const sel = group.querySelector('.sa-chip.selected');
  return sel ? sel.dataset.v : null;
}

function getSelectedChips(groupId) {
  const group = document.getElementById(groupId);
  if (!group) return [];
  return Array.from(group.querySelectorAll('.sa-chip.selected')).map(c => c.dataset.v);
}

function saNext() {
  if (saState.step === 1 && !saState.type) return;
  if (saState.step === 2) collectStep2();
  saState.step++;
  renderSearchAssistPopover();
}

function saBack() {
  if (saState.step === 2) collectStep2();
  if (saState.step === 3) collectStep3();
  saState.step--;
  renderSearchAssistPopover();
}

function saGenerate() {
  collectStep3();
  const a = saState.answers;
  let prompt = '';

  if (saState.type === 'direction') {
    const topic = a.topic || '[<研究方向>]';
    const venue = a.venue === '不限' ? 'ArXiv / 顶会' : a.venue;
    prompt = `请针对 "${topic}" 检索${a.timeRange || '近1年'}的 ${venue} 论文。\n`;
    prompt += `1. 筛选${a.paperCount || '3'}篇最具代表性的工作。\n`;
    prompt += `2. 提取它们的核心改进，用标准 LaTeX 对齐公式符号。\n`;
  } else if (saState.type === 'citation') {
    const topic = a.topic || '[<论文标题>]';
    prompt = `请检索论文 "${topic}"。\n`;
    prompt += `1. 查明发表年份、Venue、GitHub 官方实现。\n`;
    if ((a.focus || []).includes('math')) prompt += `2. 提取最核心的数学推导。\n`;
    if ((a.focus || []).includes('code')) prompt += `3. 用 PyTorch 实现最简核心算子（≤60 行）。\n`;
    if ((a.focus || []).includes('experiment')) prompt += `4. 整理 Benchmark 实验对比结果。\n`;
    if ((a.focus || []).includes('qa'))   prompt += `5. 编写 10 道技术问答。\n`;
  } else if (saState.type === 'algorithm') {
    const topic = a.topic || '[<算法名称>]';
    prompt = `请检索 "${topic}" 的技术原理。\n`;
    if (a.baseline) prompt += `对比基线：${a.baseline}。\n`;
    if (a.dimensions && a.dimensions.length > 0) prompt += `对比维度：${a.dimensions.join('、')}。\n`;
    prompt += `起草结构完整的技术对比速查。\n`;
  }

  prompt += `\n输出要求：${a.outputFormat || '全部包含'}。`;
  prompt += `深度级别：${a.depth || '中级教程'}。`;
  prompt += `\n输出为 HTML 并注册进 knowledge/ 索引。`;

  if (a.relatedChapters && a.relatedChapters.length > 0) {
    prompt += `\n\n请结合已有章节的内容，确保新内容与之衔接并建立交叉引用：${a.relatedChapters.join('、')}。`;
  }

  document.getElementById('chatInput').value = prompt;
  document.getElementById('chatInput').focus();
  closePopover(document.getElementById('searchAssistPopoverAnchor'));
}

const HISTORY_KEY = 'evolve_kb_chat_history';  // legacy localStorage key (migration only)

// History now lives in .agent/history/*.json on the backend (see PLAN_CHAT_HISTORY_REFACTOR).
// getHistory returns metadata-only conversation records (no messages array).
async function getHistory() {
  try {
    const resp = await fetch(BASE + '/api/history/list');
    return await resp.json();
  } catch { return []; }
}

// ── Real-time persistence ──────────────────────────────────────────────
// Every inbound/outbound message triggers a debounced save of the live
// chatTranscript to the backend, so a refresh or crash never loses the chat.
let _saveTimer = null;
function debouncedSaveConversation() {
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(saveCurrentConversation, 500);
}

async function saveCurrentConversation() {
  // generate(检索) mode is not part of resumable history.
  if (chatMode === 'generate') return;
  if (chatTranscript.length === 0) return;

  const firstUser = chatTranscript.find(m => m.role === 'user');
  const id = activeConversationId || ('conv_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6));
  if (!activeConversationId) activeConversationId = id;
  if (!activeConversationCreated) activeConversationCreated = new Date().toISOString();

  const now = new Date().toISOString();
  const conv = {
    id,
    title: firstUser ? firstUser.text.substring(0, 40) : 'Untitled',
    created: activeConversationCreated,
    updated: now,
    mode: chatMode,
    agent: activeAgent || 'agent',
    session_id: chatSessionId,
    current_file: currentFile,
    uploaded_pdf: getLastUploadedPdf() || sessionUploadedPdf || null,
    messageCount: chatTranscript.filter(m => m.role !== 'system').length,
    messages: chatTranscript.map(m => ({ role: m.role, text: m.text, ts: now })),
  };

  try {
    await fetch(BASE + '/api/history/save', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(conv),
    });
  } catch {}

  // Remember which conversation this tab is showing, so an F5 refresh can
  // restore it (boot_id guards against restoring across a server restart).
  try {
    sessionStorage.setItem('ek_active_conv', activeConversationId);
    if (serverBootId) sessionStorage.setItem('ek_boot_id', serverBootId);
  } catch {}
}

// Persist the current chat and detach from it, so the next message starts a
// fresh conversation record. (Root-cause fix: source is chatTranscript, not DOM.)
async function archiveCurrentChat() {
  await saveCurrentConversation();
  activeConversationId = null;
  activeConversationCreated = null;
  try { sessionStorage.removeItem('ek_active_conv'); } catch {}
}

// ── Resume a saved conversation (断点续聊) ──────────────────────────────
// Restores the full frontend state needed for multi-turn continuity: session_id
// (so baguwen/interview notes & resume cache still resolve), chatMode, the linked
// knowledge chapter, the uploaded PDF reference, and the transcript itself.
async function resumeConversation(id) {
  closeModal();

  // Persist whatever's on screen before switching away from it.
  if (chatTranscript.length > 0) await saveCurrentConversation();

  // Stop any in-flight turn and clear leftover IPC so old outbox events don't bleed in.
  await abortIfInteractiveInFlight();
  try { await fetch(BASE + '/api/clear', { method: 'POST' }); } catch {}

  let conv = null;
  try {
    const resp = await fetch(BASE + '/api/history/get?id=' + encodeURIComponent(id));
    conv = await resp.json();
  } catch {}
  if (!conv || !conv.messages) return;

  // ── Restore state — this is what makes续聊 actually continue the thread ──
  chatMode = conv.mode || 'agent';
  chatSessionId = conv.session_id || genSessionId();   // reuse原 session_id
  activeConversationId = conv.id;
  activeConversationCreated = conv.created || new Date().toISOString();
  currentFile = conv.current_file || null;              // 关联章节
  sessionUploadedPdf = conv.uploaded_pdf || null;       // 文件引用
  chatTranscript = conv.messages
    .filter(m => m.role !== 'system')
    .map(m => ({ role: m.role, text: m.text }));
  chatSessionStartTime = Date.now();                    // drop stale outbox events
  activeThinkingBubble = null;
  interactiveMsgId = null;
  pendingBaguwenOpening = false;

  // Re-render the transcript into the chat panel.
  const container = document.getElementById('chatMessages');
  container.innerHTML = '';
  for (const m of conv.messages) {
    addChatMessage(m.text, m.role);
  }

  // UI sync.
  updateModeToggleUI();
  updateChatActionsVisibility();
  if (sessionUploadedPdf) {
    // Surface the PDF so the user sees it's still attached for follow-ups.
    uploadedFiles = [{ name: sessionUploadedPdf, size: 0 }];
    renderUploadResult();
  } else {
    uploadedFiles = [];
    renderUploadResult();
  }
  pruneBackgroundTasks();
  switchPanel('chat');

  // Remember for refresh-restore, then hand the user the keyboard.
  try {
    sessionStorage.setItem('ek_active_conv', activeConversationId);
    if (serverBootId) sessionStorage.setItem('ek_boot_id', serverBootId);
  } catch {}
  const input = document.getElementById('chatInput');
  if (input) input.focus();
}

// ── One-time migration: legacy localStorage history → backend JSON files ──
async function migrateLocalStorageHistory() {
  if (localStorage.getItem('evolve_kb_history_migrated')) return;
  let old = [];
  try { old = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]'); } catch { old = []; }
  for (const conv of old) {
    // Normalise legacy shape → new schema. Mint a backend-safe id if needed.
    const id = (conv.id && /^[A-Za-z0-9_-]+$/.test(conv.id))
      ? conv.id
      : ('conv_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6));
    const ts = conv.timestamp || conv.updated || new Date().toISOString();
    const record = {
      id,
      title: conv.title || 'Untitled',
      created: conv.created || ts,
      updated: ts,
      mode: conv.mode || 'agent',
      agent: conv.agent || 'agent',
      session_id: conv.session_id || id,
      current_file: conv.current_file || null,
      uploaded_pdf: conv.uploaded_pdf || null,
      messageCount: conv.messageCount != null ? conv.messageCount : (conv.messages ? conv.messages.length : 0),
      messages: (conv.messages || []).map(m => ({ role: m.role, text: m.text, ts: m.ts || ts })),
    };
    try {
      await fetch(BASE + '/api/history/save', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(record),
      });
    } catch {}
  }
  localStorage.removeItem(HISTORY_KEY);
  localStorage.setItem('evolve_kb_history_migrated', 'true');
}

// ── Refresh-restore: tell an F5 refresh (restore) apart from a process restart ──
// (blank page) using sessionStorage + the server's boot_id.
async function tryRestoreSession() {
  let bootId = serverBootId;
  if (!bootId) {
    try {
      const resp = await fetch(BASE + '/api/config');
      const cfg = await resp.json();
      bootId = cfg.boot_id;
      serverBootId = bootId;
    } catch { return; }  // server unreachable → skip
  }

  const savedBootId = sessionStorage.getItem('ek_boot_id');
  const savedConvId = sessionStorage.getItem('ek_active_conv');

  if (!savedBootId || !savedConvId || savedBootId !== bootId) {
    // No saved session, or the server restarted → start blank.
    sessionStorage.removeItem('ek_active_conv');
    sessionStorage.removeItem('ek_boot_id');
    return;
  }

  // Same tab, same server boot → this is a refresh; restore the conversation.
  await resumeConversation(savedConvId);
}

// Sync toolbar state (selected count, batch button, select-all tri-state, empty fallback)
// from the current rows — without re-rendering the list.
function updateHistoryToolbar() {
  const body = document.getElementById('historyBody');
  if (!body) return;
  const rows = [...body.querySelectorAll('.history-item')];
  const checks = rows.map(r => r.querySelector('.history-check'));
  const selected = checks.filter(c => c && c.checked).length;

  rows.forEach(r => {
    const c = r.querySelector('.history-check');
    r.classList.toggle('selected', !!(c && c.checked));
  });

  const countEl = document.getElementById('historySelCount');
  if (countEl) countEl.textContent = '已选 ' + selected;

  const batchBtn = document.getElementById('historyBatchDelete');
  if (batchBtn) batchBtn.disabled = selected === 0;

  const clearBtn = document.getElementById('historyClearAll');
  if (clearBtn) clearBtn.disabled = rows.length === 0;

  const selectAll = document.getElementById('historySelectAll');
  if (selectAll) {
    selectAll.checked = rows.length > 0 && selected === rows.length;
    selectAll.indeterminate = selected > 0 && selected < rows.length;
    selectAll.disabled = rows.length === 0;
  }
}

function toggleHistorySelectAll(cb) {
  const body = document.getElementById('historyBody');
  if (!body) return;
  body.querySelectorAll('.history-check').forEach(c => { c.checked = cb.checked; });
  updateHistoryToolbar();
}

// Animate a row out, then drop it from the DOM and refresh toolbar/empty state.
function removeHistoryRow(id, done) {
  const body = document.getElementById('historyBody');
  if (!body) { if (done) done(); return; }
  const row = body.querySelector('.history-item[data-id="' + id + '"]');
  if (!row) { if (done) done(); return; }
  row.classList.add('removing');
  setTimeout(() => {
    row.remove();
    if (!body.querySelector('.history-item')) body.innerHTML = HISTORY_EMPTY_HTML;
    updateHistoryToolbar();
    if (done) done();
  }, 180);
}

async function viewConversation(id) {
  let conv = null;
  try {
    const resp = await fetch(BASE + '/api/history/get?id=' + encodeURIComponent(id));
    conv = await resp.json();
  } catch {}
  if (!conv || !conv.messages) return;

  closeModal();
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.onclick = (e) => { if (e.target === overlay) closeModal(); };

  const msgsHtml = conv.messages.map(m =>
    `<div class="chat-msg ${m.role}">${escapeHtml(m.text)}</div>`
  ).join('');

  const d = new Date(conv.updated || conv.created || Date.now());
  const dateStr = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0') + ' ' + String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');

  overlay.innerHTML = `
    <div class="modal" style="width:560px;max-height:85vh">
      <div class="modal-header">
        ${escapeHtml(conv.title)} · ${dateStr}
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-body">
        <div class="history-viewer">${msgsHtml}</div>
      </div>
      <div class="modal-footer" style="display:flex;gap:8px;justify-content:space-between;">
        <button class="btn btn-sm" onclick="showHistoryModal()">← Back</button>
        <button class="btn btn-sm btn-primary" onclick="resumeConversation('${conv.id}')">继续对话 →</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
}

async function _deleteHistoryBackend(ids) {
  try {
    await fetch(BASE + '/api/history/delete', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ids }),
    });
  } catch {}
  // If the conversation we're currently in got deleted, detach so a new save
  // doesn't immediately recreate it.
  if (activeConversationId && ids.includes(activeConversationId)) {
    activeConversationId = null;
    activeConversationCreated = null;
    try { sessionStorage.removeItem('ek_active_conv'); } catch {}
  }
}

// Single delete — remove on the backend then drop just that row in place.
async function deleteConversation(id) {
  await _deleteHistoryBackend([id]);
  removeHistoryRow(id);
}

// Batch delete every checked row in place.
async function batchDeleteHistory() {
  const body = document.getElementById('historyBody');
  if (!body) return;
  const ids = [...body.querySelectorAll('.history-item')]
    .filter(r => { const c = r.querySelector('.history-check'); return c && c.checked; })
    .map(r => r.getAttribute('data-id'));
  if (ids.length === 0) return;

  const ok = await showStackedConfirm('删除选中对话', `确定删除选中的 ${ids.length} 条对话历史吗？此操作不可撤销。`);
  if (!ok) return;

  await _deleteHistoryBackend(ids);
  ids.forEach(id => removeHistoryRow(id));
}

// Clear all history in place.
async function clearAllHistory() {
  const all = await getHistory();
  if (all.length === 0) return;
  const ok = await showStackedConfirm('清空全部历史', '确定删除全部对话历史吗？此操作不可撤销。');
  if (!ok) return;
  await _deleteHistoryBackend(all.map(c => c.id));
  const body = document.getElementById('historyBody');
  if (body) body.innerHTML = HISTORY_EMPTY_HTML;
  updateHistoryToolbar();
}

// A confirm dialog that stacks ABOVE the open history modal (higher z-index) instead
// of replacing it, so the history list stays put — no reload. Resolves true/false.
function showStackedConfirm(title, message) {
  return new Promise(resolve => {
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.style.zIndex = '2000';
    const finish = (val) => { overlay.remove(); resolve(val); };
    overlay.onclick = (e) => { if (e.target === overlay) finish(false); };
    overlay.innerHTML = `
      <div class="modal" style="max-width:380px;">
        <div class="modal-header">
          ${escapeHtml(title)}
          <button class="modal-close">✕</button>
        </div>
        <div class="modal-body"><p style="margin:0;font-size:14px;">${escapeHtml(message)}</p></div>
        <div class="modal-footer" style="display:flex;gap:8px;justify-content:flex-end;">
          <button class="btn btn-sm" data-act="no">取消</button>
          <button class="btn btn-sm btn-danger" data-act="yes">删除</button>
        </div>
      </div>`;
    overlay.querySelector('.modal-close').onclick = () => finish(false);
    overlay.querySelector('[data-act="no"]').onclick = () => finish(false);
    overlay.querySelector('[data-act="yes"]').onclick = () => finish(true);
    document.body.appendChild(overlay);
  });
}
</script>
