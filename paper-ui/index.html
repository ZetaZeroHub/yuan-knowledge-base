<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>元知识库</title>
<style>
:root {
  --paper-bg: #faf8f5;
  --paper-surface: #ffffff;
  --paper-border: #e8e4df;
  --paper-text: #2c2c2c;
  --paper-text-secondary: #6b6560;
  --paper-accent: #4a7fb5;
  --paper-accent-hover: #3a6fa0;
  --paper-accent-light: #e8f0f8;
  --paper-success: #4a9b6f;
  --paper-warning: #c4943a;
  --paper-error: #c45a5a;
  --paper-radius: 6px;
  --paper-shadow: 0 1px 3px rgba(0,0,0,0.06);
  --sidebar-width: 280px;
  --right-panel-width: 380px;
  --topbar-height: 48px;
  --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", sans-serif;
  --font-mono: "SF Mono", "Fira Code", "Consolas", monospace;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font-sans);
  background: var(--paper-bg);
  color: var(--paper-text);
  height: 100vh;
  overflow: hidden;
}

/* --- Layout --- */
.app-shell {
  display: grid;
  grid-template-rows: var(--topbar-height) 1fr;
  grid-template-columns: var(--sidebar-width) 1fr var(--right-panel-width);
  height: 100vh;
}

.topbar {
  grid-column: 1 / -1;
  background: var(--paper-surface);
  border-bottom: 1px solid var(--paper-border);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 16px;
  z-index: 10;
}

.topbar-title {
  font-size: 15px;
  font-weight: 600;
  letter-spacing: -0.01em;
}

.topbar-subtitle {
  font-size: 12px;
  color: var(--paper-text-secondary);
}

.topbar-spacer { flex: 1; }

.lang-toggle {
  font-size: 11px;
  font-weight: 600;
  padding: 3px 10px;
  border: 1px solid var(--paper-border);
  border-radius: 6px;
  background: var(--paper-surface);
  color: var(--paper-text-secondary);
  cursor: pointer;
  line-height: 1.4;
}
.lang-toggle:hover { background: var(--paper-bg); color: var(--paper-text); }

.topbar-status {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: var(--paper-text-secondary);
}

.status-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--paper-success);
}

.status-dot.offline { background: var(--paper-error); }

/* --- Sidebar --- */
.sidebar {
  background: var(--paper-surface);
  border-right: 1px solid var(--paper-border);
  overflow-y: auto;
  padding: 12px 0;
}

.sidebar-section {
  padding: 0 16px;
  margin-bottom: 8px;
}

.sidebar-heading {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--paper-text-secondary);
  padding: 8px 0 4px;
}

.nav-group { margin-bottom: 4px; }

.nav-group-label {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 16px;
  font-size: 13px;
  font-weight: 600;
  color: var(--paper-text);
  cursor: pointer;
  border-radius: var(--paper-radius);
  user-select: none;
}

.nav-group-label:hover { background: var(--paper-accent-light); }

.nav-group-label .arrow {
  font-size: 10px;
  transition: transform 0.15s;
  color: var(--paper-text-secondary);
}

.nav-group.collapsed .arrow { transform: rotate(-90deg); }
.nav-group.collapsed .nav-items { display: none; }

.nav-item {
  display: block;
  padding: 5px 16px 5px 36px;
  font-size: 12px;
  color: var(--paper-text-secondary);
  text-decoration: none;
  border-radius: var(--paper-radius);
  cursor: pointer;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.nav-item:hover {
  background: var(--paper-accent-light);
  color: var(--paper-accent);
}

.nav-item.active {
  background: var(--paper-accent-light);
  color: var(--paper-accent);
  font-weight: 500;
}

/* --- Sidebar note actions (hover-triggered Popover) --- */
.nav-item-wrapper {
  position: relative;
}

/* The "⋯" trigger sits over the nav-item's right edge; nudge label padding so
   long titles don't slide under it. */
.nav-item-wrapper .nav-item {
  padding-right: 30px;
}

.nav-item-actions {
  position: absolute;
  right: 6px;
  top: 50%;
  transform: translateY(-50%);
  display: flex;
  align-items: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.15s ease;
}

.nav-item-wrapper:hover .nav-item-actions,
.nav-item-actions.open {
  opacity: 1;
  pointer-events: auto;
}

.action-dot {
  border: none;
  background: none;
  cursor: pointer;
  color: var(--paper-text-secondary);
  font-size: 15px;
  line-height: 1;
  width: 22px;
  height: 22px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
  transition: background 0.2s ease, color 0.2s ease, transform 0.2s ease;
}

.action-dot:hover {
  background: rgba(0, 0, 0, 0.06);
  color: var(--paper-accent);
  transform: scale(1.08);
}

.action-dot:active {
  transform: scale(0.92);
}

/* --- Drag & drop: the ⋯ dot doubles as the note's drag handle --- */
.action-dot[draggable="true"] { cursor: grab; }
.action-dot[draggable="true"]:active { cursor: grabbing; }

.nav-item-wrapper.dragging { opacity: 0.45; }

/* Insertion line shown between items while dragging. */
.nav-drop-indicator {
  height: 2px;
  margin: 0 16px 0 36px;
  background: var(--paper-accent);
  border-radius: 2px;
  pointer-events: none;
}

/* Highlight the chapter a note is being dragged into. */
.nav-group.drag-over .nav-items {
  background: var(--paper-accent-light);
  border-radius: 6px;
}

/* --- Chapter actions (hover-triggered rename pencil) --- */
.nav-group-label { position: relative; }

.nav-group-actions {
  margin-left: auto;
  display: flex;
  align-items: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.15s ease;
}

.nav-group-label:hover .nav-group-actions { opacity: 1; pointer-events: auto; }

.chapter-edit-btn {
  border: none;
  background: none;
  cursor: pointer;
  color: var(--paper-text-secondary);
  font-size: 12px;
  line-height: 1;
  width: 22px;
  height: 22px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
  transition: background 0.2s ease, transform 0.2s ease;
}

.chapter-edit-btn:hover {
  background: rgba(0, 0, 0, 0.06);
  transform: scale(1.08);
}

/* Popover panel — Apple-style frosted glass with a gentle spring entrance */
.note-popover {
  position: fixed;
  z-index: 1000;
  width: max-content;
  min-width: 150px;
  background: rgba(255, 255, 255, 0.66);
  -webkit-backdrop-filter: blur(24px) saturate(180%);
  backdrop-filter: blur(24px) saturate(180%);
  border: 0.5px solid rgba(0, 0, 0, 0.08);
  border-radius: 14px;
  box-shadow:
    0 12px 40px rgba(0, 0, 0, 0.16),
    0 2px 8px rgba(0, 0, 0, 0.06),
    inset 0 0.5px 0 rgba(255, 255, 255, 0.7);
  padding: 6px;
  opacity: 0;
  transform: scale(0.88) translateY(-6px);
  transform-origin: top right;
  transition:
    opacity 0.4s cubic-bezier(0.32, 0.72, 0, 1),
    transform 0.5s cubic-bezier(0.22, 1.12, 0.36, 1);
  pointer-events: none;
}

.note-popover.visible {
  opacity: 1;
  transform: scale(1) translateY(0);
  pointer-events: auto;
}

.popover-action {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 12px;
  font-size: 13px;
  border-radius: 9px;
  cursor: pointer;
  color: var(--paper-text);
  width: 100%;
  border: none;
  background: none;
  text-align: left;
  transition: background 0.18s ease, color 0.18s ease;
}

.popover-action:hover {
  background: var(--paper-accent);
  color: #fff;
}

.popover-action.danger {
  color: var(--paper-error);
}

.popover-action.danger:hover {
  background: var(--paper-error);
  color: #fff;
}

/* Inline line-icons — borderless, color inherited from the button. */
.kb-icon {
  width: 16px;
  height: 16px;
  flex-shrink: 0;
  display: block;
}

.popover-action { white-space: nowrap; }

.chapter-edit-btn .kb-icon,
.action-dot .kb-icon { width: 14px; height: 14px; }

/* Toast notifications — frosted dark pill */
.kb-toast {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%) translateY(16px) scale(0.96);
  background: rgba(38, 38, 40, 0.72);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  backdrop-filter: blur(20px) saturate(180%);
  color: #fff;
  padding: 12px 20px;
  border-radius: 14px;
  font-size: 13px;
  border: 0.5px solid rgba(255, 255, 255, 0.12);
  box-shadow: 0 10px 36px rgba(0, 0, 0, 0.24);
  z-index: 2000;
  opacity: 0;
  transition:
    opacity 0.4s cubic-bezier(0.32, 0.72, 0, 1),
    transform 0.5s cubic-bezier(0.22, 1.12, 0.36, 1);
  pointer-events: none;
}

.kb-toast.visible {
  opacity: 1;
  transform: translateX(-50%) translateY(0) scale(1);
}

/* --- Main Viewport --- */
.main-viewport {
  display: flex;
  flex-direction: column;
  background: var(--paper-bg);
  overflow: hidden;
}

.viewport-toolbar {
  display: flex;
  align-items: center;
  padding: 8px 16px;
  gap: 8px;
  background: var(--paper-surface);
  border-bottom: 1px solid var(--paper-border);
  font-size: 12px;
  color: var(--paper-text-secondary);
  min-height: 36px;
}

.viewport-path {
  flex: 1;
  font-family: var(--font-mono);
  font-size: 12px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.viewport-content {
  flex: 1;
  position: relative;
}

.viewport-content iframe {
  width: 100%;
  height: 100%;
  border: none;
  background: white;
}

.viewport-placeholder {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: var(--paper-text-secondary);
  gap: 12px;
}

.viewport-placeholder .icon {
  font-size: 48px;
  opacity: 0.3;
}

.viewport-placeholder p {
  font-size: 14px;
}

/* --- Right Panel (Chat + Controls) --- */
.right-panel {
  position: relative;
  background: var(--paper-surface);
  border-left: 1px solid var(--paper-border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.panel-tabs {
  display: flex;
  border-bottom: 1px solid var(--paper-border);
  background: var(--paper-bg);
}

.panel-tab {
  flex: 1;
  padding: 10px 12px;
  font-size: 12px;
  font-weight: 500;
  text-align: center;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  color: var(--paper-text-secondary);
  transition: all 0.15s;
}

.panel-tab:hover { color: var(--paper-text); }

.panel-tab.active {
  color: var(--paper-accent);
  border-bottom-color: var(--paper-accent);
}

.panel-content {
  flex: 1;
  overflow-y: auto;
  display: none;
}

.panel-content.active { display: flex; flex-direction: column; }

/* --- Chat Panel --- */
.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 52px 16px 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.chat-msg {
  position: relative;
  max-width: 90%;
  padding: 10px 14px;
  border-radius: 12px;
  font-size: 13px;
  line-height: 1.5;
  overflow-wrap: break-word;
  word-break: break-word;
  white-space: pre-wrap;
}

/* Hover toolbar (copy / withdraw) — borderless SVG icons, no emoji. */
.msg-actions {
  position: absolute;
  bottom: 4px;
  right: 6px;
  display: flex;
  gap: 2px;
  padding: 1px 2px;
  border-radius: 6px;
  background: inherit;            /* pill matches bubble bg, hides text behind */
  opacity: 0;
  transition: opacity 0.12s ease;
}
.chat-msg:hover .msg-actions,
.msg-actions:focus-within { opacity: 1; }
.msg-action-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border: none;
  background: transparent;
  cursor: pointer;
  padding: 3px;
  line-height: 0;
  border-radius: 4px;
  color: var(--paper-text-secondary);
}
.msg-action-btn:hover { background: rgba(0, 0, 0, 0.08); color: var(--paper-text); }
.chat-msg.user .msg-action-btn { color: rgba(255, 255, 255, 0.85); }
.chat-msg.user .msg-action-btn:hover { background: rgba(255, 255, 255, 0.2); color: #fff; }
.chat-msg.system .msg-actions { background: var(--paper-accent-light); }

.chat-msg.system {
  align-self: center;
  background: var(--paper-accent-light);
  color: var(--paper-accent);
  font-size: 12px;
  max-width: 100%;
  text-align: center;
  border-radius: var(--paper-radius);
}

.chat-msg.user {
  align-self: flex-end;
  background: var(--paper-accent);
  color: white;
  border-bottom-right-radius: 4px;
}

.chat-msg.agent {
  align-self: flex-start;
  background: #f0ede8;
  color: var(--paper-text);
  border-bottom-left-radius: 4px;
}

/* Markdown-rendered bubbles (agent/system). Plain user input keeps pre-wrap. */
.chat-msg.md { white-space: normal; }
.chat-msg.md > :first-child { margin-top: 0; }
.chat-msg.md > :last-child { margin-bottom: 0; }
.chat-msg.md p { margin: 0 0 8px; }
.chat-msg.md ul, .chat-msg.md ol { margin: 4px 0 8px; padding-left: 20px; }
.chat-msg.md li { margin: 2px 0; }
.chat-msg.md h1, .chat-msg.md h2, .chat-msg.md h3,
.chat-msg.md h4, .chat-msg.md h5, .chat-msg.md h6 {
  margin: 10px 0 4px; font-size: 14px; font-weight: 600;
}
.chat-msg.md pre {
  background: rgba(0, 0, 0, 0.05); padding: 8px 10px; border-radius: 6px;
  overflow-x: auto; margin: 6px 0;
}
.chat-msg.md code {
  font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px;
}
.chat-msg.md pre code { display: block; white-space: pre; }
.chat-msg.md blockquote {
  border-left: 3px solid var(--paper-border); margin: 6px 0; padding-left: 10px;
  color: var(--paper-text-secondary);
}
.chat-msg.md a { color: var(--paper-accent); }
.chat-msg.md hr { border: none; border-top: 1px solid var(--paper-border); margin: 8px 0; }
.chat-msg.md mjx-container { overflow-x: auto; overflow-y: hidden; max-width: 100%; }

.chat-input-area {
  padding: 12px 16px;
  border-top: 1px solid var(--paper-border);
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.chat-textarea {
  width: 100%;
  min-height: 60px;
  max-height: 120px;
  padding: 10px 12px;
  border: 1px solid var(--paper-border);
  border-radius: var(--paper-radius);
  font-family: var(--font-sans);
  font-size: 13px;
  resize: vertical;
  outline: none;
  background: var(--paper-bg);
  transition: border-color 0.15s;
}

.chat-textarea:focus { border-color: var(--paper-accent); }

.chat-actions {
  display: flex;
  gap: 8px;
  align-items: center;
}

.btn {
  padding: 7px 16px;
  border-radius: var(--paper-radius);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid var(--paper-border);
  background: var(--paper-surface);
  color: var(--paper-text);
  transition: all 0.15s;
}

.btn:hover { background: var(--paper-bg); }

.btn-primary {
  background: var(--paper-accent);
  color: white;
  border-color: var(--paper-accent);
}

.btn-primary:hover { background: var(--paper-accent-hover); }

.btn-sm {
  padding: 5px 10px;
  font-size: 11px;
}

.btn-icon {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 32px; height: 32px;
  padding: 0;
  border: none;
  background: none;
  color: var(--paper-text-secondary);
  border-radius: var(--paper-radius);
  cursor: pointer;
  transition: background 0.2s ease, color 0.2s ease, transform 0.2s ease;
}

.btn-icon:hover {
  background: var(--paper-accent-light);
  color: var(--paper-accent);
  transform: scale(1.08);
}

.btn-icon:active {
  transform: scale(0.94);
}

.btn-icon svg { width: 18px; height: 18px; }

.btn-icon:disabled {
  opacity: 0.25;
  cursor: not-allowed;
}

.btn-icon:disabled:hover { background: none; }

/* --- Upload Area --- */
.upload-section {
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.upload-zone {
  border: 2px dashed var(--paper-border);
  border-radius: var(--paper-radius);
  padding: 32px 16px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
}

.upload-zone:hover,
.upload-zone.dragover {
  border-color: var(--paper-accent);
  background: var(--paper-accent-light);
}

.upload-zone .icon { font-size: 32px; margin-bottom: 8px; opacity: 0.5; }
.upload-zone p { font-size: 13px; color: var(--paper-text-secondary); }
.upload-zone .hint { font-size: 11px; margin-top: 4px; }

.upload-file-input { display: none; }

/* ── Upload result (pending files before send) ── */
.upload-result {
  display: none;
  flex-wrap: wrap;
  gap: 8px;
  padding: 0;
  margin-top: 2px;
}
.upload-result.visible { display: flex; }

.upload-file-card {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 5px 10px;
  border-radius: 10px;
  background: rgba(255, 255, 255, 0.55);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  backdrop-filter: blur(20px) saturate(180%);
  border: 0.5px solid rgba(0, 0, 0, 0.06);
  box-shadow:
    0 2px 8px rgba(0, 0, 0, 0.06),
    0 0.5px 0 rgba(255, 255, 255, 0.8) inset;
  max-width: 240px;
  transition: box-shadow 0.25s ease, transform 0.2s ease;
  animation: fileCardIn 0.3s cubic-bezier(0.22, 1.12, 0.36, 1);
}

.upload-file-card:hover {
  box-shadow:
    0 4px 16px rgba(0, 0, 0, 0.1),
    0 0.5px 0 rgba(255, 255, 255, 0.8) inset;
  transform: translateY(-1px);
}

@keyframes fileCardIn {
  from { opacity: 0; transform: scale(0.92) translateY(6px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}

.file-icon-wrap {
  position: relative;
  width: 24px;
  height: 24px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}

.file-icon-wrap svg {
  width: 24px;
  height: 24px;
}

.file-icon-ext {
  position: absolute;
  bottom: -1px;
  right: -4px;
  font-size: 7px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.02em;
  padding: 0.5px 3px;
  border-radius: 3px;
  background: #e74c3c;
  color: #fff;
  line-height: 1.2;
}

.file-icon-ext.ext-pdf  { background: #e74c3c; }
.file-icon-ext.ext-doc  { background: #2b579a; }
.file-icon-ext.ext-xls  { background: #217346; }
.file-icon-ext.ext-ppt  { background: #d04423; }
.file-icon-ext.ext-img  { background: #0ea5e9; }
.file-icon-ext.ext-txt  { background: #8b8b8b; }

.file-info {
  flex: 1;
  min-width: 0;
  display: flex;
  align-items: baseline;
  gap: 5px;
}

.file-info-name {
  font-size: 12px;
  font-weight: 500;
  color: var(--paper-text);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  line-height: 1;
}

.file-info-size {
  font-size: 10px;
  color: var(--paper-text-secondary);
  opacity: 0.7;
  line-height: 1;
  flex-shrink: 0;
}

.file-remove-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 16px;
  height: 16px;
  border: none;
  background: rgba(0, 0, 0, 0.06);
  border-radius: 50%;
  cursor: pointer;
  color: var(--paper-text-secondary);
  flex-shrink: 0;
  transition: background 0.2s ease, color 0.2s ease, transform 0.15s ease;
}

.file-remove-btn:hover {
  background: rgba(0, 0, 0, 0.12);
  color: var(--paper-error);
  transform: scale(1.1);
}

.file-remove-btn svg { width: 10px; height: 10px; }

/* ── Chat message attachments (sent) ── */
.msg-attachments {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  align-self: flex-end;
  margin-bottom: -4px;
}

.msg-attachment {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 7px 12px;
  border-radius: 11px;
  background: rgba(255, 255, 255, 0.5);
  -webkit-backdrop-filter: blur(18px) saturate(170%);
  backdrop-filter: blur(18px) saturate(170%);
  border: 0.5px solid rgba(0, 0, 0, 0.06);
  box-shadow:
    0 1px 4px rgba(0, 0, 0, 0.06),
    inset 0 0.5px 0 rgba(255, 255, 255, 0.7);
  max-width: 240px;
  animation: fileCardIn 0.3s cubic-bezier(0.22, 1.12, 0.36, 1);
}

.msg-attachment .att-icon-wrap {
  position: relative;
  width: 28px;
  height: 28px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}

.msg-attachment .att-icon-wrap svg {
  width: 28px;
  height: 28px;
}

.msg-attachment .att-ext {
  position: absolute;
  bottom: 0;
  right: -2px;
  font-size: 7px;
  font-weight: 700;
  text-transform: uppercase;
  padding: 0.5px 3px;
  border-radius: 3px;
  background: #e74c3c;
  color: #fff;
  line-height: 1.2;
}

.msg-attachment .att-info {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  gap: 0;
}

.msg-attachment .att-name {
  font-size: 12px;
  font-weight: 500;
  color: var(--paper-text);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  line-height: 1.3;
}

.msg-attachment .att-size {
  font-size: 10px;
  color: var(--paper-text-secondary);
  opacity: 0.6;
  line-height: 1.2;
}

/* --- Progress Panel --- */
.progress-section {
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.progress-task-card {
  background: var(--paper-bg);
  border-radius: var(--paper-radius);
  padding: 14px 16px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.progress-task-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--paper-text);
  line-height: 1.4;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.progress-task-meta {
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 11px;
  color: var(--paper-text-secondary);
}

.progress-task-meta .agent-badge {
  background: var(--paper-accent-light);
  color: var(--paper-accent);
  padding: 2px 8px;
  border-radius: 10px;
  font-weight: 500;
}

.btn-stop-agent {
  background: none;
  border: none;
  color: var(--paper-text-secondary);
  cursor: pointer;
  padding: 2px;
  margin-left: auto;
  display: flex;
  align-items: center;
  opacity: 0.5;
  transition: opacity 0.15s, color 0.15s;
}
.btn-stop-agent:hover {
  opacity: 1;
  color: #e74c3c;
}
.task-completed .btn-stop-agent {
  display: none;
}

.progress-bar-track {
  height: 4px;
  background: var(--paper-border);
  border-radius: 2px;
  overflow: hidden;
}

.progress-bar-fill {
  height: 100%;
  width: 30%;
  background: var(--paper-accent);
  border-radius: 2px;
  animation: pulse-bar 2s ease-in-out infinite;
}

.progress-bar-fill.completed {
  width: 100%;
  background: var(--paper-success);
  animation: none;
}

.progress-bar-fill.error {
  width: 100%;
  background: var(--paper-error);
  animation: none;
}

@keyframes pulse-bar {
  0%   { width: 20%; opacity: 0.7; }
  50%  { width: 60%; opacity: 1; }
  100% { width: 20%; opacity: 0.7; }
}

.progress-timeline {
  display: flex;
  flex-direction: column;
  gap: 0;
  padding: 0 4px;
}

.progress-timeline-heading {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--paper-text-secondary);
  padding: 4px 0 6px;
}

.milestone-item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 5px 0;
  font-size: 12px;
  position: relative;
}

.milestone-item::before {
  content: '';
  position: absolute;
  left: 4px;
  top: 18px;
  bottom: -5px;
  width: 1px;
  background: var(--paper-border);
}

.milestone-item:last-child::before { display: none; }

.milestone-dot {
  width: 9px;
  height: 9px;
  border-radius: 50%;
  background: var(--paper-accent);
  flex-shrink: 0;
  margin-top: 3px;
}

.milestone-dot.working {
  background: var(--paper-warning);
  animation: dot-pulse 1.5s ease-in-out infinite;
}

.milestone-dot.finished {
  background: var(--paper-success);
}

.milestone-dot.error-dot {
  background: var(--paper-error);
}

.milestone-dot.cat-search  { background: var(--paper-accent); }
.milestone-dot.cat-tool    { background: #8b8b8b; }
.milestone-dot.cat-lifecycle { background: var(--paper-success); }
.milestone-dot.cat-done    { background: var(--paper-success); }
.milestone-dot.cat-error   { background: var(--paper-error); }
.milestone-dot.cat-file    { background: var(--paper-success); }
.milestone-dot.cat-analysis { background: var(--paper-warning); }
.milestone-dot.cat-sent    { background: var(--paper-accent); }

/* ── Step Progress Tree ── */
.progress-steps {
  display: flex;
  flex-direction: column;
  gap: 0;
  padding: 4px 0 8px;
}

.step-node {
  position: relative;
  padding-left: 28px;
  padding-bottom: 2px;
}

.step-node::before {
  content: '';
  position: absolute;
  left: 9px;
  top: 22px;
  bottom: 0;
  width: 1.5px;
  background: var(--paper-border);
  transition: background 0.35s ease;
}

.step-node:last-child::before { display: none; }

.step-node.completed::before {
  background: var(--paper-success);
}

.step-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 5px 0;
  font-size: 12px;
  cursor: default;
}

.step-icon {
  position: absolute;
  left: 0;
  width: 20px;
  height: 20px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  border: 2px solid var(--paper-border);
  background: var(--paper-surface);
  transition: all 0.25s ease;
  transform: scale(1);
}

.step-icon.transitioning {
  transform: scale(0.85);
}

.step-node.pending .step-icon {
  border-color: var(--paper-border);
  background: var(--paper-bg);
}

.step-node.pending .step-label {
  color: var(--paper-text-secondary);
  opacity: 0.45;
}

.step-node.active .step-icon {
  border-color: var(--paper-accent);
  background: var(--paper-accent);
  color: white;
  animation: step-glow 2s ease-in-out infinite;
}

.step-node.active .step-label {
  color: var(--paper-accent);
  font-weight: 600;
}

@keyframes step-glow {
  0%, 100% { box-shadow: 0 0 0 0 rgba(74, 127, 181, 0.35); }
  50%      { box-shadow: 0 0 0 5px rgba(74, 127, 181, 0); }
}

.step-node.completed .step-icon {
  border-color: var(--paper-success);
  background: var(--paper-success);
  color: white;
}

.step-node.completed .step-label {
  color: var(--paper-text);
  opacity: 0.7;
}

.step-node.error .step-icon {
  border-color: var(--paper-error);
  background: var(--paper-error);
  color: white;
}

.step-node.error .step-label {
  color: var(--paper-error);
}

.step-label {
  font-weight: 500;
  flex: 1;
  transition: color 0.25s ease, opacity 0.25s ease;
}

.step-badge {
  font-size: 10px;
  padding: 1px 7px;
  border-radius: 8px;
  background: var(--paper-accent-light);
  color: var(--paper-accent);
  font-weight: 500;
  white-space: nowrap;
  animation: badge-pop 0.2s ease;
}

@keyframes badge-pop {
  from { transform: scale(0.8); opacity: 0; }
  to   { transform: scale(1);   opacity: 1; }
}

.step-content {
  overflow: hidden;
  max-height: 0;
  opacity: 0;
  transform: translateY(8px);
  transition: max-height 0.35s ease-in-out,
              opacity 0.3s ease-in-out 0.05s,
              transform 0.3s ease-in-out;
  -webkit-mask-image: linear-gradient(black var(--mask-stop, 0%), transparent var(--mask-stop, 0%));
  mask-image: linear-gradient(black var(--mask-stop, 0%), transparent var(--mask-stop, 0%));
  margin-left: 2px;
  padding-left: 10px;
  border-left: 1px solid var(--paper-border);
}

.step-node.active .step-content {
  max-height: 200px;
  opacity: 1;
  transform: translateY(0);
  --mask-stop: 100%;
}

.step-node.completed .step-content {
  max-height: 0;
  opacity: 0;
  transform: translateY(-4px);
  --mask-stop: 0%;
}

.step-sub-item {
  padding: 3px 0;
  font-size: 11px;
  color: var(--paper-text-secondary);
  font-family: var(--font-mono);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  animation: sub-item-enter 0.25s ease;
}

@keyframes sub-item-enter {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}

.step-sub-overflow {
  font-size: 11px;
  color: var(--paper-accent);
  padding: 3px 0;
  font-style: italic;
}

/* ── Multi-task card blocks ── */
.task-block + .task-block { margin-top: 16px; }

.task-timeline-wrapper { margin-top: 4px; }

.task-timeline-toggle {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 4px;
  cursor: pointer;
  font-size: 11px;
  color: var(--paper-text-secondary);
  user-select: none;
}

.task-timeline-toggle:hover { color: var(--paper-accent); }

.task-timeline-toggle .arrow {
  font-size: 10px;
  transition: transform 0.25s ease;
}

.task-timeline-body {
  overflow-y: auto;
  max-height: none;
  opacity: 1;
  transform: translateY(0);
  transition: max-height 0.35s ease-in-out,
              opacity 0.3s ease-in-out,
              transform 0.3s ease-in-out;
  -webkit-mask-image: linear-gradient(black var(--mask-stop, 100%), transparent var(--mask-stop, 100%));
  mask-image: linear-gradient(black var(--mask-stop, 100%), transparent var(--mask-stop, 100%));
}

.task-timeline-wrapper.collapsed .arrow { transform: rotate(-90deg); }
.task-timeline-wrapper.collapsed .task-timeline-body {
  max-height: 0;
  overflow: hidden;
  opacity: 0;
  transform: translateY(-8px);
  --mask-stop: 0%;
}

.task-block .progress-task-card.task-completed {
  opacity: 0.7;
}

.task-milestone-count {
  margin-left: auto;
  font-size: 10px;
  color: var(--paper-text-secondary);
  opacity: 0.7;
}

@keyframes dot-pulse {
  0%, 100% { opacity: 0.4; }
  50%      { opacity: 1; }
}

.milestone-text {
  flex: 1;
  line-height: 1.4;
  color: var(--paper-text);
  word-break: break-all;
}

.milestone-time {
  color: var(--paper-text-secondary);
  font-size: 11px;
  white-space: nowrap;
  flex-shrink: 0;
}

.progress-empty {
  padding: 32px 16px;
  text-align: center;
  color: var(--paper-text-secondary);
  font-size: 13px;
}

/* --- Config Panel --- */
.config-section {
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.config-heading {
  font-size: 12px;
  font-weight: 600;
  padding: 8px 0 4px;
  color: var(--paper-text);
}

.config-card {
  background: var(--paper-bg);
  border-radius: var(--paper-radius);
  padding: 12px 14px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.agent-btn-group {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

.agent-btn {
  padding: 6px 14px;
  border-radius: 16px;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid var(--paper-border);
  background: var(--paper-surface);
  color: var(--paper-text);
  transition: all 0.15s;
}

.agent-btn:hover { border-color: var(--paper-accent); color: var(--paper-accent); }

.agent-btn.active {
  background: var(--paper-accent);
  color: white;
  border-color: var(--paper-accent);
}

.config-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 12px;
  background: var(--paper-bg);
  border-radius: var(--paper-radius);
  font-size: 12px;
}

.config-label { color: var(--paper-text-secondary); }

.config-value {
  display: flex;
  align-items: center;
  gap: 6px;
  font-weight: 500;
}

.config-status {
  display: flex;
  align-items: center;
  gap: 6px;
  font-weight: 500;
}

.config-status.ok { color: var(--paper-success); }
.config-status.warn { color: var(--paper-warning); }
.config-status.err { color: var(--paper-error); }

.timeout-select {
  padding: 4px 8px;
  border: 1px solid var(--paper-border);
  border-radius: var(--paper-radius);
  font-size: 12px;
  background: var(--paper-surface);
  font-family: var(--font-sans);
  cursor: pointer;
}

.toggle-switch {
  position: relative;
  width: 36px;
  height: 20px;
  cursor: pointer;
}

.toggle-switch input { display: none; }

.toggle-slider {
  position: absolute;
  inset: 0;
  background: var(--paper-border);
  border-radius: 10px;
  transition: background 0.2s;
}

.toggle-slider::before {
  content: '';
  position: absolute;
  width: 16px;
  height: 16px;
  left: 2px;
  top: 2px;
  background: white;
  border-radius: 50%;
  transition: transform 0.2s;
}

.toggle-switch input:checked + .toggle-slider {
  background: var(--paper-accent);
}

.toggle-switch input:checked + .toggle-slider::before {
  transform: translateX(16px);
}

.config-btn-row {
  padding-top: 8px;
}

/* --- Scrollbar --- */
.nav-item-draft {
  font-style: italic;
}

.draft-badge {
  font-size: 9px;
  background: var(--paper-warning);
  color: white;
  padding: 1px 5px;
  border-radius: 3px;
  margin-left: 4px;
  font-style: normal;
  font-weight: 500;
  vertical-align: middle;
}

.raw-output-toggle {
  margin-top: 8px;
}

.raw-output {
  margin-top: 8px;
  padding: 10px;
  background: var(--paper-bg);
  border-radius: var(--paper-radius);
  font-family: var(--font-mono);
  font-size: 11px;
  max-height: 400px;
  overflow-y: auto;
  white-space: pre-wrap;
  word-break: break-all;
}

.agent-summary {
  white-space: pre-wrap;
}

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #d0ccc6; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #b8b3ac; }

/* --- Modal Infrastructure (Phase A) --- */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.35);
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
  animation: modalFadeIn 0.15s ease;
}

@keyframes modalFadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}

.modal {
  background: var(--paper-surface);
  border-radius: 12px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.18);
  width: 480px;
  max-width: 92vw;
  max-height: 80vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  animation: modalSlideIn 0.18s ease;
}

@keyframes modalSlideIn {
  from { transform: translateY(16px); opacity: 0; }
  to   { transform: translateY(0);    opacity: 1; }
}

.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px;
  border-bottom: 1px solid var(--paper-border);
  font-size: 15px;
  font-weight: 600;
}

.modal-close {
  width: 28px; height: 28px;
  border: none; background: none;
  font-size: 18px; cursor: pointer;
  color: var(--paper-text-secondary);
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
}

.modal-close:hover { background: var(--paper-bg); color: var(--paper-text); }

.modal-body {
  padding: 16px 20px;
  overflow-y: auto;
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.modal-footer {
  padding: 12px 20px;
  border-top: 1px solid var(--paper-border);
  display: flex;
  justify-content: flex-end;
  gap: 8px;
}

/* Template cards */
.template-card {
  padding: 14px 16px;
  border: 1px solid var(--paper-border);
  border-radius: var(--paper-radius);
  cursor: pointer;
  transition: all 0.15s;
}

.template-card:hover {
  border-color: var(--paper-accent);
  background: var(--paper-accent-light);
}

.template-card-title {
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 2px;
}

.template-card-subtitle {
  font-size: 11px;
  color: var(--paper-text-secondary);
  margin-bottom: 4px;
}

.template-card-desc {
  font-size: 11px;
  color: var(--paper-text-secondary);
  line-height: 1.4;
}

/* Search-Assist home: wizard launcher + template separator */
.sa-home-entry {
  padding: 14px 16px;
  border: 1px solid var(--paper-accent);
  border-radius: var(--paper-radius);
  background: var(--paper-accent-light);
  cursor: pointer;
  transition: all 0.15s;
}

.sa-home-entry:hover {
  background: var(--paper-accent);
}

.sa-home-entry:hover .sa-home-entry-title,
.sa-home-entry:hover .sa-home-entry-desc {
  color: #fff;
}

.sa-home-entry-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--paper-accent);
  margin-bottom: 2px;
}

.sa-home-entry-desc {
  font-size: 11px;
  color: var(--paper-text-secondary);
  line-height: 1.4;
}

.sa-home-sep {
  font-size: 11px;
  color: var(--paper-text-secondary);
  text-align: center;
  margin: 4px 0 2px;
}

/* ── Popover ── */
.popover-anchor {
  position: relative;
  z-index: 1001;
}

.popover-backdrop {
  position: fixed;
  inset: 0;
  z-index: 999;
}

.popover-panel {
  position: fixed;
  z-index: 1000;
  background: var(--paper-surface);
  border: 1px solid var(--paper-border);
  border-radius: 12px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.15);
  transform-origin: bottom center;
  animation: popoverIn 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.1);
}

@keyframes popoverIn {
  from { opacity: 0; transform: scale(0.85); }
  to   { opacity: 1; transform: scale(1); }
}

.popover-panel .popover-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  border-bottom: 1px solid var(--paper-border);
  font-size: 13px;
  font-weight: 600;
  color: var(--paper-text);
}

.popover-panel .popover-body {
  padding: 10px 14px;
  max-height: 50vh;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.popover-panel .popover-footer {
  padding: 8px 16px;
  border-top: 1px solid var(--paper-border);
  display: flex;
  justify-content: flex-end;
  gap: 8px;
}

/* Search Assist wizard */
.sa-step-indicator {
  display: flex;
  gap: 6px;
  margin-bottom: 8px;
}

.sa-step-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--paper-border);
}

.sa-step-dot.active { background: var(--paper-accent); }
.sa-step-dot.done   { background: var(--paper-success); }

.sa-question {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 12px;
}

.sa-option {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 10px 12px;
  border: 1px solid var(--paper-border);
  border-radius: var(--paper-radius);
  cursor: pointer;
  transition: all 0.15s;
  margin-bottom: 6px;
}

.sa-option:hover { border-color: var(--paper-accent); background: var(--paper-accent-light); }

.sa-option.selected {
  border-color: var(--paper-accent);
  background: var(--paper-accent-light);
}

.sa-option input[type="radio"],
.sa-option input[type="checkbox"] { margin-top: 2px; flex-shrink: 0; }

.sa-option-label { font-size: 13px; font-weight: 500; }
.sa-option-desc  { font-size: 11px; color: var(--paper-text-secondary); }

.sa-field-group {
  margin-bottom: 10px;
}

.sa-field-label {
  font-size: 12px;
  font-weight: 500;
  margin-bottom: 4px;
  color: var(--paper-text);
}

.sa-input {
  width: 100%;
  padding: 8px 10px;
  border: 1px solid var(--paper-border);
  border-radius: var(--paper-radius);
  font-size: 13px;
  font-family: var(--font-sans);
  outline: none;
  transition: border-color 0.15s;
}

.sa-input:focus { border-color: var(--paper-accent); }

.sa-radio-group,
.sa-check-group {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 4px;
}

.sa-chip {
  padding: 4px 10px;
  border: 1px solid var(--paper-border);
  border-radius: 16px;
  font-size: 11px;
  cursor: pointer;
  transition: all 0.15s;
  user-select: none;
  max-width: 100%;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.sa-chip:hover { border-color: var(--paper-accent); }
.sa-chip.selected { background: var(--paper-accent); color: white; border-color: var(--paper-accent); }

/* Panel sub-bar (Phase B) */
.panel-sub-bar {
  position: absolute;
  top: 39px;
  left: 0;
  right: 0;
  z-index: 20;
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 12px 0;
  background: transparent;
  justify-content: center;
  pointer-events: none;
}

.panel-sub-bar.hidden { display: none; }

.panel-sub-bar .btn-sm { font-size: 11px; padding: 4px 10px; }

/* Chat mode toggle-group (检索 / 八股) — animate-ui toggle-group semantics in native CSS */
.chat-mode-sep { width: 1px; height: 18px; background: var(--paper-border); margin: 0 4px; }
.chat-mode-group {
  display: inline-flex;
  align-items: center;
  gap: 2px;
  padding: 2px;
  border-radius: 999px;
  background: rgba(255,255,255,0.65);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid var(--paper-border);
  box-shadow: 0 8px 24px rgba(30, 24, 16, 0.12);
  pointer-events: auto;
}
.chat-mode-btn {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  line-height: 1;
  padding: 5px 10px;
  border: none;
  border-radius: 999px;
  background: transparent;
  color: var(--paper-text-secondary);
  cursor: pointer;
  transition: background 0.18s ease, color 0.18s ease, transform 0.12s ease;
}
.chat-mode-btn:hover { color: var(--paper-text); transform: scale(1.06); }
.chat-mode-btn:active { transform: scale(0.95); }
.chat-mode-btn.active {
  background: var(--paper-accent);
  color: #fff;
  transform: translateY(-0.5px);
  box-shadow: 0 1px 4px rgba(74,127,181,0.35);
}
.chat-mode-btn svg { width: 13px; height: 13px; }

/* Interview controls (inline icon dropdowns) */
.iv-dropdown-wrap {
  display: flex; align-items: center; gap: 8px;
}
.iv-dropdown-unit { position: relative; }
.iv-dropdown-btn {
  display: flex; align-items: center; gap: 5px;
  background: none; border: none; cursor: pointer;
  color: var(--paper-text-secondary); padding: 5px 12px; border-radius: 6px;
  min-width: 56px;
  transition: background 0.2s ease, color 0.2s ease, transform 0.2s ease;
}
.iv-dropdown-btn svg { width: 15px; height: 15px; flex-shrink: 0; }
.iv-dropdown-btn:hover { color: var(--paper-text); background: var(--paper-hover); transform: scale(1.04); }
.iv-dropdown-btn:active { transform: scale(0.96); }
.iv-btn-label { font-size: 12px; white-space: nowrap; }
.iv-dropdown-menu {
  position: absolute; bottom: calc(100% + 4px); left: 0;
  background: var(--paper-bg); border: 1px solid var(--paper-border);
  border-radius: 8px; box-shadow: 0 4px 16px rgba(0,0,0,0.12);
  padding: 4px 0; z-index: 200; min-width: 72px;
  opacity: 0; transform: translateY(6px) scale(0.95);
  pointer-events: none;
  transition: opacity 0.2s ease, transform 0.2s ease;
}
.iv-dropdown-menu.show {
  opacity: 1; transform: translateY(0) scale(1);
  pointer-events: auto;
}
.iv-dropdown-item {
  display: flex; align-items: center; gap: 6px;
  padding: 6px 14px; font-size: 12px; cursor: pointer;
  color: var(--paper-text); white-space: nowrap;
  transition: background 0.15s ease;
}
.iv-dropdown-item svg { width: 14px; height: 14px; flex-shrink: 0; }
.iv-dropdown-item:hover { background: var(--paper-hover); }
.iv-dropdown-item.active { color: var(--paper-accent); font-weight: 600; }

/* Inline "thinking" bubble + completion button */
.chat-msg.agent.thinking { opacity: 0.85; }
.thinking-elapsed { color: var(--paper-text-secondary); font-size: 11px; }
.thinking-dots::after {
  content: '';
  animation: thinkingDots 1.2s steps(4, end) infinite;
}
@keyframes thinkingDots {
  0% { content: ''; } 25% { content: '·'; } 50% { content: '··'; }
  75% { content: '···'; } 100% { content: ''; }
}
.completion-btn {
  align-self: flex-start;
  margin: -2px 0 4px;
  font-size: 11px;
  padding: 4px 10px;
  border: 1px solid var(--paper-accent);
  border-radius: 999px;
  background: #fff;
  color: var(--paper-accent);
  cursor: pointer;
  transition: background 0.15s ease;
}
.completion-btn:hover { background: var(--paper-accent-light); }
.completion-btn:disabled { opacity: 0.5; cursor: default; }

/* Completion options modal (new note vs append) */
.completion-option-cards { display: flex; flex-direction: column; gap: 8px; }
.completion-option-card {
  padding: 10px 14px;
  border: 1px solid var(--paper-border);
  border-radius: 6px;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
}
.completion-option-card:hover {
  border-color: var(--paper-accent);
  background: rgba(0,0,0,0.03);
}
.completion-option-title { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
.completion-option-desc { font-size: 12px; color: var(--paper-text-secondary); }

/* Abort button shown next to the in-flight completion button */
.completion-abort-btn {
  display: inline-block;
  font-size: 12px;
  padding: 2px 10px;
  margin-left: 8px;
  border: 1px solid var(--paper-text-secondary);
  border-radius: 4px;
  background: none;
  color: var(--paper-text-secondary);
  cursor: pointer;
  vertical-align: middle;
}
.completion-abort-btn:hover {
  border-color: var(--paper-accent);
  color: var(--paper-accent);
}

/* Borderless icon "undo" affordance shown after a completion lands */
.completion-undo-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  vertical-align: middle;
  width: 22px; height: 22px;
  margin-left: 6px;
  padding: 0;
  border: none;
  background: none;
  color: var(--paper-text-secondary);
  border-radius: 4px;
  cursor: pointer;
  transition: color 0.15s, background 0.15s;
}
.completion-undo-btn:hover { color: var(--paper-accent); background: rgba(0,0,0,0.05); }
.completion-undo-btn:disabled { opacity: 0.55; cursor: default; }
.completion-undo-btn:disabled:hover { background: none; }
.completion-undo-btn svg { width: 15px; height: 15px; display: block; }

/* Cancel (✕) button on an uploaded-PDF result line */
.upload-cancel-btn {
  display: inline-flex;
  align-items: center;
  vertical-align: middle;
  margin-left: 4px;
  padding: 0;
  background: none;
  border: none;
  color: var(--paper-text-secondary);
  cursor: pointer;
}
.upload-cancel-btn:hover { color: var(--paper-text); }

/* Selection bubble over the knowledge iframe (animate-ui tooltip semantics) */
.sel-bubble {
  position: fixed;
  z-index: 4000;
  transform: translate(-50%, -100%) scale(0.96);
  background: #2c2c2c;
  color: #fff;
  font-size: 12px;
  padding: 6px 11px;
  border-radius: 8px;
  cursor: pointer;
  white-space: nowrap;
  box-shadow: 0 4px 14px rgba(0,0,0,0.25);
  opacity: 0;
  transition: opacity 0.14s ease, transform 0.14s ease;
  pointer-events: auto;
}
.sel-bubble.visible { opacity: 1; transform: translate(-50%, -100%) scale(1); }
.sel-bubble::after {
  content: '';
  position: absolute;
  bottom: -5px; left: 50%;
  transform: translateX(-50%);
  border-left: 5px solid transparent;
  border-right: 5px solid transparent;
  border-top: 5px solid #2c2c2c;
}

/* History modal */
.history-item {
  padding: 10px 14px;
  border: 1px solid var(--paper-border);
  border-radius: var(--paper-radius);
  display: flex;
  align-items: center;
  gap: 10px;
}

.history-item-info {
  flex: 1;
  min-width: 0;
}

.history-item-title {
  font-size: 13px;
  font-weight: 500;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.history-item-meta {
  font-size: 11px;
  color: var(--paper-text-secondary);
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 2px;
}

.history-item-actions {
  display: flex;
  gap: 2px;
  flex-shrink: 0;
}

.history-viewer {
  max-height: 400px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 8px;
  padding: 8px 0;
}

.history-viewer .chat-msg { max-width: 100%; }

.history-check {
  flex-shrink: 0;
  width: 15px;
  height: 15px;
  cursor: pointer;
  accent-color: var(--paper-accent);
}
.history-item.selected {
  border-color: var(--paper-accent);
  background: var(--paper-bg);
}
.history-item.removing {
  animation: historyRowOut 0.18s ease forwards;
}
@keyframes historyRowOut {
  to { opacity: 0; transform: translateX(12px); height: 0; padding-top: 0; padding-bottom: 0; margin: 0; border-width: 0; }
}
.history-toolbar {
  justify-content: flex-start;
  align-items: center;
  gap: 10px;
}
.history-toolbar .spacer { flex: 1; }
.history-selectall {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: var(--paper-text-secondary);
  cursor: pointer;
  user-select: none;
}
.history-sel-count { font-size: 12px; color: var(--paper-text-secondary); }
.btn-danger { background: #e74c3c; color: #fff; border: none; }
.btn-danger:hover { background: #d44233; }
.btn[disabled] { opacity: 0.45; cursor: not-allowed; }
</style>

window.MathJax = {

</script>

</head>

<div class="app-shell">

          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>

          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>

              </div>

<script>
const BASE = location.origin;

function t(key) {
  const e = I18N[key];
  return e ? (e[currentLang] || e.zh) : key;
}

// Apply current language to all tagged chrome elements. Idempotent and safe to
// re-run on every toggle. Never touches elements without a data-i18n* attribute.
function applyLang() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const k = el.getAttribute('data-i18n');
    if (I18N[k]) el.textContent = t(k);
  });
  document.querySelectorAll('[data-i18n-title]').forEach(el => {
    const k = el.getAttribute('data-i18n-title');
    if (I18N[k]) el.setAttribute('title', t(k));
  });
  document.querySelectorAll('[data-i18n-ph]').forEach(el => {
    const k = el.getAttribute('data-i18n-ph');
    if (I18N[k]) el.setAttribute('placeholder', t(k));
  });
  // viewportPath doubles as the open file's path (set by loadFile). Restore it
  // after the generic sweep so toggling language never clobbers the live path.
  if (typeof currentFile !== 'undefined' && currentFile) {
    const vp = document.getElementById('viewportPath');
    if (vp) vp.textContent = 'knowledge/' + currentFile;
  }
  document.documentElement.lang = currentLang === 'zh' ? 'zh-CN' : 'en';
  const btn = document.getElementById('langToggle');
  if (btn) btn.textContent = currentLang === 'zh' ? 'EN' : '中';
}

function toggleLang() {
  currentLang = currentLang === 'zh' ? 'en' : 'zh';
  localStorage.setItem(LANG_KEY, currentLang);
  applyLang();
  updateModeToggleUI();
}

function renderNavTree() {
  const container = document.getElementById('navTree');
  let html = '';
  KB_TREE.forEach((group, gi) => {
    // Chapter rename + note drag/drop require the live tree's `dir` field. The
    // static fallback KB_TREE has no `dir`, so those affordances stay hidden there.
    const dir = group.dir || '';
    const editable = !!dir;
    const dirAttr = editable ? ` data-dir="${escapeHtml(dir)}"` : '';
    html += `<div class="nav-group" id="navGroup${gi}"${dirAttr}>`;
    html += `<div class="nav-group-label" onclick="toggleGroup(${gi})">`;
    html += `<span class="arrow">&#9660;</span> <span class="nav-group-text">${escapeHtml(group.label)}</span>`;
    if (editable) {
      const dj = jsStr(dir), lj = jsStr(group.label);
      html += `<span class="nav-group-actions"><button class="chapter-edit-btn" onclick="renameChapter(event, '${dj}', '${lj}')" title="重命名章节" aria-label="重命名章节">${ICON.pencil}</button></span>`;
    }
    html += `</div><div class="nav-items">`;
    group.items.forEach(item => {
      const draftBadge = '';
      const draftClass = '';
      const f = item.file.replace(/'/g, "\\'");
      const wrapDir = editable ? ` data-dir="${escapeHtml(dir)}"` : '';
      const dragAttr = editable ? ' draggable="true"' : '';
      html += `<div class="nav-item-wrapper" data-file="${escapeHtml(item.file)}"${wrapDir}>`;
      html += `<a class="nav-item${draftClass}" data-file="${item.file}" onclick="loadFile('${f}', this)">${escapeHtml(item.label)}${draftBadge}</a>`;
      html += `<div class="nav-item-actions"><button class="action-dot"${dragAttr} onclick="toggleNotePopover(event, '${f}', '${escapeHtml(item.label).replace(/'/g, "\\'")}')" title="操作">⋯</button></div>`;
      html += `</div>`;
    });
    html += `</div></div>`;
  });
  container.innerHTML = html;
  ensureNavDnd();
}

// Escape a value for safe embedding inside a single-quoted inline JS string.
function jsStr(s) {
  return String(s).replace(/\\/g, '\\\\').replace(/'/g, "\\'");
}

// ── Sidebar note-action Popover ─────────────────────────────────────────
// Distinct from the search-assist popover system (closeAllPopovers); these
// note popovers are appended to <body> and positioned via fixed coords so the
// sidebar's overflow can't clip them.

function closeAllNotePopovers() {
  document.querySelectorAll('.note-popover').forEach(p => {
    p.classList.remove('visible');
    setTimeout(() => p.remove(), 200);  // wait out the exit transition
  });
  document.querySelectorAll('.nav-item-actions.open').forEach(a => a.classList.remove('open'));
}

function toggleNotePopover(event, filePath, label) {
  event.stopPropagation();
  event.preventDefault();
  const trigger = event.currentTarget;
  const wasOpen = document.querySelector('.note-popover');
  closeAllNotePopovers();
  if (wasOpen) return;  // second click on the same dot closes it

  // Keep the dot visible while its popover is open (hover may move away).
  const actions = trigger.closest('.nav-item-actions');
  if (actions) actions.classList.add('open');

  const pop = document.createElement('div');
  pop.className = 'note-popover';
  pop.innerHTML = `
    <button class="popover-action" data-act="open">${ICON.external}<span>在新标签页打开</span></button>
    <button class="popover-action" data-act="rename">${ICON.pencil}<span>重命名标签</span></button>
    <button class="popover-action danger" data-act="delete">${ICON.trash}<span>删除笔记</span></button>`;
  document.body.appendChild(pop);

  // Position below-left of the trigger, clamped to the viewport.
  const r = trigger.getBoundingClientRect();
  const pw = pop.offsetWidth || 180;
  let left = r.right - pw;
  if (left < 8) left = 8;
  let top = r.bottom + 4;
  if (top + pop.offsetHeight > window.innerHeight - 8) {
    top = r.top - pop.offsetHeight - 4;  // flip above if it would overflow
  }
  pop.style.left = left + 'px';
  pop.style.top = top + 'px';

  pop.querySelector('[data-act="open"]').onclick = (e) => {
    e.stopPropagation();
    window.open(KB_BASE + filePath, '_blank');
    closeAllNotePopovers();
  };
  pop.querySelector('[data-act="rename"]').onclick = (e) => {
    e.stopPropagation();
    closeAllNotePopovers();
    renameNoteLabel(filePath, label);
  };
  pop.querySelector('[data-act="delete"]').onclick = (e) => {
    e.stopPropagation();
    closeAllNotePopovers();
    deleteNote(filePath, label);
  };

  requestAnimationFrame(() => pop.classList.add('visible'));
}

async function deleteNote(filePath, label) {
  const ok = await showConfirmModal('删除笔记',
    '确定删除《' + escapeHtml(label || filePath) + '》吗？此操作会移除 HTML 文件并更新 INDEX_KB.md，且不可撤销。');
  if (!ok) return;
  try {
    const resp = await fetch(BASE + '/api/knowledge-note', {
      method: 'DELETE',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ file: filePath }),
    });
    const data = await resp.json();
    if (!resp.ok || !data.ok) {
      showToast('删除失败：' + (data.error || resp.status), 'error');
      return;
    }
    // If the deleted file is in the viewport, clear it.
    if (currentFile === filePath) {
      currentFile = null;
      const iframe = document.querySelector('#viewportContent iframe');
      if (iframe) iframe.remove();
      const vp = document.getElementById('viewportPath');
      if (vp) vp.textContent = '';
    }
    await fetchKnowledgeTree();
    showToast('已删除《' + (label || filePath) + '》');
  } catch {
    showToast('删除失败：服务器不可达', 'error');
  }
}

async function renameNoteLabel(filePath, oldLabel) {
  const newLabel = window.prompt('重命名标签（仅修改页面中的显示，不改文件名和文件内容，避免破坏索引）：', oldLabel || '');
  if (newLabel === null) return;          // cancelled
  const trimmed = newLabel.trim();
  if (!trimmed || trimmed === oldLabel) return;
  try {
    const resp = await fetch(BASE + '/api/knowledge-note/rename', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ file: filePath, new_label: trimmed }),
    });
    const data = await resp.json();
    if (!resp.ok || !data.ok) {
      showToast('重命名失败：' + (data.error || resp.status), 'error');
      return;
    }
    await fetchKnowledgeTree();
    showToast('标签已更新为「' + trimmed + '」');
  } catch {
    showToast('重命名失败：服务器不可达', 'error');
  }
}

// ── Drag & drop: reorder notes within / move notes across chapters ───────
// The ⋯ dot is the drag handle. Listeners live on #navTree (event delegation)
// so they survive renderNavTree()'s innerHTML rebuilds.
let _navDndInit = false;
let _dnd = { fromFile: null, fromDir: null };

function ensureNavDnd() {
  if (_navDndInit) return;
  const tree = document.getElementById('navTree');
  if (!tree) return;
  _navDndInit = true;

  tree.addEventListener('dragstart', (e) => {
    const dot = e.target.closest('.action-dot[draggable="true"]');
    if (!dot) return;
    const wrapper = dot.closest('.nav-item-wrapper');
    if (!wrapper || !wrapper.dataset.file) return;
    _dnd.fromFile = wrapper.dataset.file;
    _dnd.fromDir = wrapper.dataset.dir || '';
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', _dnd.fromFile);  // Firefox needs payload
    wrapper.classList.add('dragging');
  });

  tree.addEventListener('dragover', (e) => {
    if (!_dnd.fromFile) return;
    const t = _dndTarget(e);
    if (!t) { _clearDnDMarkers(); return; }
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    _showDropIndicator(t);
  });

  tree.addEventListener('drop', (e) => {
    if (!_dnd.fromFile) return;
    const t = _dndTarget(e);
    if (!t) { _endDnD(); return; }
    e.preventDefault();
    const fromFile = _dnd.fromFile, fromDir = _dnd.fromDir;
    const beforeFile = t.beforeEl ? t.beforeEl.dataset.file : null;
    _endDnD();
    if (t.dir === fromDir) {
      const order = _buildReorder(t.dir, fromFile, beforeFile);
      if (order) reorderNotes(t.dir, order);
    } else {
      const targetFiles = [...t.items.querySelectorAll('.nav-item-wrapper')].map(w => w.dataset.file);
      let idx = beforeFile ? targetFiles.indexOf(beforeFile) : targetFiles.length;
      if (idx < 0) idx = targetFiles.length;
      moveNote(fromFile, t.dir, idx);
    }
  });

  tree.addEventListener('dragend', _endDnD);
}

function _dndTarget(e) {
  const group = e.target.closest('.nav-group');
  if (!group || !group.dataset.dir) return null;   // non-editable group → reject
  const items = group.querySelector('.nav-items');
  if (!items) return null;
  const wrappers = [...items.querySelectorAll('.nav-item-wrapper')];
  let index = wrappers.length, beforeEl = null;
  for (let i = 0; i < wrappers.length; i++) {
    const r = wrappers[i].getBoundingClientRect();
    if (e.clientY < r.top + r.height / 2) { index = i; beforeEl = wrappers[i]; break; }
  }
  return { group, dir: group.dataset.dir, items, index, beforeEl };
}

function _showDropIndicator(t) {
  _clearDnDMarkers();
  t.group.classList.add('drag-over');
  const ind = document.createElement('div');
  ind.className = 'nav-drop-indicator';
  if (t.beforeEl) t.items.insertBefore(ind, t.beforeEl);
  else t.items.appendChild(ind);
}

function _clearDnDMarkers() {
  document.querySelectorAll('.nav-drop-indicator').forEach(n => n.remove());
  document.querySelectorAll('.nav-group.drag-over').forEach(g => g.classList.remove('drag-over'));
}

function _endDnD() {
  _clearDnDMarkers();
  document.querySelectorAll('.nav-item-wrapper.dragging').forEach(w => w.classList.remove('dragging'));
  _dnd.fromFile = null;
  _dnd.fromDir = null;
}

// Build the new full order for a chapter after dropping fromFile before beforeFile.
// Returns null if the order is unchanged.
function _buildReorder(dir, fromFile, beforeFile) {
  const group = [...document.querySelectorAll('.nav-group')].find(g => g.dataset.dir === dir);
  if (!group) return null;
  const files = [...group.querySelectorAll('.nav-item-wrapper')].map(w => w.dataset.file);
  const without = files.filter(f => f !== fromFile);
  let at = without.length;
  if (beforeFile && beforeFile !== fromFile) {
    const bi = without.indexOf(beforeFile);
    if (bi >= 0) at = bi;
  }
  without.splice(at, 0, fromFile);
  if (without.length === files.length && without.every((f, i) => f === files[i])) return null;
  return without;
}

async function reorderNotes(dir, order) {
  try {
    const resp = await fetch(BASE + '/api/knowledge-note/reorder', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ dir, order }),
    });
    const data = await resp.json();
    if (!resp.ok || !data.ok) {
      showToast('排序失败：' + (data.error || resp.status), 'error');
      await fetchKnowledgeTree();   // resync to server truth
      return;
    }
    await fetchKnowledgeTree();
  } catch {
    showToast('排序失败：服务器不可达', 'error');
    await fetchKnowledgeTree();
  }
}

async function moveNote(file, toDir, index) {
  try {
    const resp = await fetch(BASE + '/api/knowledge-note/move', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ file, to_dir: toDir, index }),
    });
    const data = await resp.json();
    if (!resp.ok || !data.ok) {
      showToast('移动失败：' + (data.error || resp.status), 'error');
      await fetchKnowledgeTree();
      return;
    }
    // The moved note's rel_path changed — keep the open viewport in sync.
    if (currentFile === data.from) {
      currentFile = data.to;
      const vp = document.getElementById('viewportPath');
      if (vp) vp.textContent = 'knowledge/' + data.to;
      const iframe = document.querySelector('#viewportContent iframe');
      if (iframe) iframe.src = KB_BASE + data.to;
    }
    await fetchKnowledgeTree();
    let msg = '已移动到目标章节';
    if (data.refs_rewritten) msg += '（已更新 ' + data.refs_rewritten + ' 处互链）';
    showToast(msg);
  } catch {
    showToast('移动失败：服务器不可达', 'error');
    await fetchKnowledgeTree();
  }
}

let _toastTimer = null;
function showToast(message, kind) {
  const existing = document.querySelector('.kb-toast');
  if (existing) existing.remove();
  if (_toastTimer) clearTimeout(_toastTimer);
  const el = document.createElement('div');
  el.className = 'kb-toast';
  if (kind === 'error') el.style.background = 'rgba(178, 58, 58, 0.74)';
  el.textContent = message;
  document.body.appendChild(el);
  requestAnimationFrame(() => el.classList.add('visible'));
  _toastTimer = setTimeout(() => {
    el.classList.remove('visible');
    setTimeout(() => el.remove(), 200);
  }, 3000);
}

async function loadFile(file, el) {
  // A live baguwen (八股) page is anchored to a chapter. Switching to a different
  // chapter re-anchors it: we archive the old session and restart the same mode
  // on the new chapter, so the session can never silently point at one chapter
  // while currentFile points at another.
  const reanchor = chatMode === 'baguwen' && file !== currentFile;

  // Re-anchoring only aborts the in-flight baguwen *turn* (re-issued on the
  // new chapter). Background 补充 tasks keep running in Progress regardless.

  document.querySelectorAll('.nav-item.active').forEach(n => n.classList.remove('active'));
  if (el) el.classList.add('active');
  currentFile = file;
  document.getElementById('viewportPath').textContent = 'knowledge/' + file;
  const placeholder = document.getElementById('viewportPlaceholder');
  if (placeholder) placeholder.remove();
  let iframe = document.querySelector('#viewportContent iframe');
  if (!iframe) {
    iframe = document.createElement('iframe');
    document.getElementById('viewportContent').appendChild(iframe);
  }
  // Re-attach the selection bubble listeners on every (re)load — a fresh
  // contentDocument means fresh listeners, so no duplicates accumulate.
  iframe.onload = attachSelectionListener;
  hideSelBubble();
  iframe.src = KB_BASE + file;

  // currentFile now points at the new chapter — restart the mode against it.
  if (reanchor) await enterChatMode(chatMode);
}

function openExternal() {
  if (currentFile) window.open(KB_BASE + currentFile, '_blank');
}

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ── Markdown + math rendering for chat bubbles ──────────────────────────
// Mirrors skills/render_html/render.py's contract: stash math / code spans
// before applying Markdown (so subscripts like f_x and backslashes like
// \Sigma survive untouched), then let MathJax typeset the result. Used for
// agent and system bubbles only; user input stays plain text.
const _MD_PH_OPEN = '';   // PUA chars — never appear in chat content and
const _MD_PH_CLOSE = '';  // pass through escapeHtml/Markdown unchanged.

function escapeAttr(s) {
  return String(s).replace(/&/g, '&amp;').replace(/"/g, '&quot;')
                  .replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// Allow only safe URL schemes (blocks javascript:/data:/vbscript:), matching
// render.py's _safe_url. Relative paths and bare paths are permitted.
function safeUrl(url) {
  const s = String(url).trim().toLowerCase();
  if (s === '' || /^(#|\/|\.\/|\.\.\/)/.test(s)) return url;
  if (/^(https?:|mailto:|ftp:|tel:)/.test(s)) return url;
  if (!/^[^/]*:/.test(s)) return url;            // bare path, no scheme
  return '#blocked-unsafe-url';
}

// Inline pass: protect inline code + inline math, escape, then apply emphasis.
function renderInline(text, stash) {
  const store = (html) => { stash.push(html); return _MD_PH_OPEN + (stash.length - 1) + _MD_PH_CLOSE; };
  text = text.replace(/`([^`\n]+)`/g, (m, c) => store('<code>' + escapeHtml(c) + '</code>'));
  text = text.replace(/\\\(([\s\S]*?)\\\)/g, (m, b) => store('\\(' + b + '\\)'));
  text = text.replace(/(?<!\\)\$([^$\n]+?)\$/g, (m, b) => store('$' + b + '$'));
  text = escapeHtml(text);
  text = text.replace(/\[([^\]]+)\]\(([^)\s]+)\)/g,
    (m, label, href) => '<a href="' + escapeAttr(safeUrl(href)) + '" target="_blank" rel="noopener">' + label + '</a>');
  text = text.replace(/\*\*([^*\n]+)\*\*/g, '<strong>$1</strong>');
  text = text.replace(/(?<!\*)\*([^*\n]+)\*(?!\*)/g, '<em>$1</em>');
  text = text.replace(/(?<!\w)_([^_\n]+)_(?!\w)/g, '<em>$1</em>');
  text = text.replace(/~~([^~\n]+)~~/g, '<del>$1</del>');
  return text;
}

// Block pass: headings, fenced code, lists, blockquotes, hr, paragraphs.
function renderMessageHtml(raw) {
  const stash = [];
  const store = (html) => { stash.push(html); return _MD_PH_OPEN + (stash.length - 1) + _MD_PH_CLOSE; };
  let text = String(raw).replace(/\r\n/g, '\n');

  // Protect multi-line spans (fenced code + display math) before block parsing.
  text = text.replace(/```(\w*)\n?([\s\S]*?)```/g,
    (m, lang, body) => '\n' + store('<pre><code>' + escapeHtml(body.replace(/\n$/, '')) + '</code></pre>') + '\n');
  text = text.replace(/\$\$([\s\S]*?)\$\$/g, (m, b) => store('$$' + b + '$$'));
  text = text.replace(/\\\[([\s\S]*?)\\\]/g, (m, b) => store('\\[' + b + '\\]'));

  const lines = text.split('\n');
  const out = [];
  const blockPHRe = new RegExp('^' + _MD_PH_OPEN + '(\\d+)' + _MD_PH_CLOSE + '$');
  const isBlockPH = (t) => { const m = t.match(blockPHRe); return m && /^<pre>/.test(stash[+m[1]]); };
  let i = 0;
  while (i < lines.length) {
    const t = lines[i].trim();
    if (t === '') { i++; continue; }
    if (isBlockPH(t)) { out.push(t); i++; continue; }           // fenced code, no <p>
    let m = t.match(/^(#{1,6})\s+(.+?)\s*#*$/);
    if (m) { const lv = m[1].length; out.push('<h' + lv + '>' + renderInline(m[2], stash) + '</h' + lv + '>'); i++; continue; }
    if (/^(-{3,}|\*{3,}|_{3,})$/.test(t)) { out.push('<hr>'); i++; continue; }
    if (/^[-*+]\s+/.test(t)) {
      const items = [];
      while (i < lines.length && /^\s*[-*+]\s+/.test(lines[i])) {
        items.push('<li>' + renderInline(lines[i].replace(/^\s*[-*+]\s+/, ''), stash) + '</li>'); i++;
      }
      out.push('<ul>' + items.join('') + '</ul>'); continue;
    }
    if (/^\d+[.)]\s+/.test(t)) {
      const items = [];
      while (i < lines.length && /^\s*\d+[.)]\s+/.test(lines[i])) {
        items.push('<li>' + renderInline(lines[i].replace(/^\s*\d+[.)]\s+/, ''), stash) + '</li>'); i++;
      }
      out.push('<ol>' + items.join('') + '</ol>'); continue;
    }
    if (/^>\s?/.test(t)) {
      const qs = [];
      while (i < lines.length && /^>\s?/.test(lines[i].trim())) { qs.push(lines[i].trim().replace(/^>\s?/, '')); i++; }
      out.push('<blockquote>' + renderInline(qs.join(' '), stash) + '</blockquote>'); continue;
    }
    const para = [];
    while (i < lines.length) {
      const lt = lines[i].trim();
      if (lt === '' || isBlockPH(lt) || /^(#{1,6})\s+/.test(lt) || /^[-*+]\s+/.test(lt) ||
          /^\d+[.)]\s+/.test(lt) || /^>\s?/.test(lt) || /^(-{3,}|\*{3,}|_{3,})$/.test(lt)) break;
      para.push(lt); i++;
    }
    out.push('<p>' + renderInline(para.join(' '), stash) + '</p>');
  }

  // Restore every placeholder (single pass — stashed HTML has no nested PH).
  return out.join('\n').replace(new RegExp(_MD_PH_OPEN + '(\\d+)' + _MD_PH_CLOSE, 'g'), (m, idx) => stash[+idx]);
}

// Typeset math inside a bubble once MathJax is ready (the CDN loads async, so
// early bubbles retry until it arrives; bounded so offline just degrades to
// showing the raw TeX source).
function typesetMath(el, attempt) {
  attempt = attempt || 0;
  if (window.MathJax && window.MathJax.typesetPromise) {
    MathJax.typesetPromise([el]).catch((e) => console.warn('MathJax typeset failed:', e));
  } else if (attempt < 50) {
    setTimeout(() => typesetMath(el, attempt + 1), 200);
  }
}

// Render Markdown+math into an element and queue MathJax typesetting.
// Stash the raw source on the element so the copy button can yield the
// original Markdown rather than the rendered text.
function setRenderedContent(el, text) {
  el.classList.add('md');
  el.dataset.mdSource = text;
  el.innerHTML = renderMessageHtml(text);
  typesetMath(el);
}

// ── Per-bubble actions: copy (all) + withdraw (last baguwen/interview user turn) ──
const ICON_COPY = '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="11" height="11" rx="2"></rect><path d="M5 15V5a2 2 0 0 1 2-2h10"></path></svg>';
const ICON_UNDO = '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 14L4 9l5-5"></path><path d="M4 9h11a5 5 0 0 1 0 10h-4"></path></svg>';
// File-with-lines icon — distinguishes "copy full raw output" from the plain copy.
const ICON_COPY_RAW = '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z"></path><path d="M14 3v5h5"></path><path d="M9 13h6M9 17h6"></path></svg>';

function makeActionBtn(svg, label, onClick, extraClass) {
  const b = document.createElement('button');
  b.type = 'button';
  b.className = 'msg-action-btn' + (extraClass ? ' ' + extraClass : '');
  b.title = label;
  b.setAttribute('aria-label', label);
  b.innerHTML = svg;
  b.onclick = onClick;
  return b;
}

async function copyText(text) {
  try {
    await navigator.clipboard.writeText(text || '');
  } catch {
    const ta = document.createElement('textarea');
    ta.value = text || '';
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); } catch {}
    document.body.removeChild(ta);
  }
  showToast('已复制');
}

// The hover toolbar lives inside the bubble; reuse it if already created.
function getMsgActions(msgEl) {
  let bar = msgEl.querySelector(':scope > .msg-actions');
  if (!bar) {
    bar = document.createElement('div');
    bar.className = 'msg-actions';
    msgEl.appendChild(bar);
  }
  return bar;
}

// Attach the copy button (reads the bubble's stashed Markdown source).
function attachMessageActions(msgEl) {
  const bar = getMsgActions(msgEl);
  bar.appendChild(makeActionBtn(ICON_COPY, '复制', () => copyText(msgEl.dataset.mdSource), 'msg-copy'));
}

// E1/E3: only the LAST user bubble in baguwen/interview is withdrawable. Re-evaluate
// after every message add and after a withdrawal so the affordance follows the tail.
function updateWithdrawAffordance() {
  const container = document.getElementById('chatMessages');
  container.querySelectorAll('.msg-withdraw').forEach((b) => b.remove());
  if (chatMode !== 'baguwen' && chatMode !== 'interview' && chatMode !== 'yuan') return;
  const users = container.querySelectorAll('.chat-msg.user');
  if (!users.length) return;
  const last = users[users.length - 1];
  getMsgActions(last).appendChild(
    makeActionBtn(ICON_UNDO, '撤回', () => withdrawUserTurn(last), 'msg-withdraw'));
}

// Withdraw the last user turn: abort anything in flight, roll back the
// frontend-authoritative transcript, remove its bubbles, refill the input.
async function withdrawUserTurn(userMsgEl) {
  const container = document.getElementById('chatMessages');

  // E4 — abort the in-flight baguwen/interview turn (background 补充 tasks unaffected).
  await abortIfInteractiveInFlight();
  stopThinkingTimer();
  if (activeThinkingBubble) { activeThinkingBubble.remove(); activeThinkingBubble = null; }
  interactiveMsgId = null;
  // Rotate the session id so a late agent_response for the aborted turn is
  // dropped by the poll's sessionMismatch guard (no /api/clear, no file deletes).
  chatSessionId = genSessionId();

  // E2 — recover the user's text to refill the input.
  const restored = userMsgEl.dataset.mdSource || '';

  // E1 — this is the tail, so remove it and every following node (agent
  // replies, system notices, completion buttons, a stray thinking bubble).
  let node = userMsgEl;
  const toRemove = [];
  while (node) { toRemove.push(node); node = node.nextElementSibling; }
  toRemove.forEach((n) => n.remove());

  // Trim the transcript from the last user entry to the end (root rollback).
  let idx = -1;
  for (let i = chatTranscript.length - 1; i >= 0; i--) {
    if (chatTranscript[i].role === 'user') { idx = i; break; }
  }
  if (idx >= 0) chatTranscript.length = idx;

  const input = document.getElementById('chatInput');
  if (input) { input.value = restored; input.focus(); }

  updateWithdrawAffordance();
}

function addChatMessage(text, role, attachments) {
  const container = document.getElementById('chatMessages');
  if (attachments && attachments.length > 0) {
    const attWrap = document.createElement('div');
    attWrap.className = 'msg-attachments';
    for (const att of attachments) {
      const ext = getFileExt(att.name);
      const extCls = getExtClass(ext);
      const sizeStr = att.size >= 1048576
        ? (att.size / 1048576).toFixed(1) + ' MB'
        : (att.size / 1024).toFixed(1) + ' KB';
      const card = document.createElement('span');
      card.className = 'msg-attachment';
      card.innerHTML =
        '<span class="att-icon-wrap">'
        + fileIconSvg(28)
        + (ext ? '<span class="att-ext ' + extCls + '">' + ext + '</span>' : '')
        + '</span>'
        + '<span class="att-info">'
        + '<span class="att-name">' + escapeHtml(att.name) + '</span>'
        + '<span class="att-size">' + sizeStr + '</span>'
        + '</span>';
      attWrap.appendChild(card);
    }
    container.appendChild(attWrap);
  }
  const msg = document.createElement('div');
  msg.className = 'chat-msg ' + role;
  if (role === 'user') {
    // The start tokens are control signals (kept verbatim in the transcript for
    // backend phase detection); show a friendly label in the bubble instead.
    const display = (text === '__INTERVIEW_START__') ? '开始面试'
                  : (text === '__BAGUWEN_START__') ? '开始八股'
                  : (text === '__YUAN_START__') ? '开始元 skill' : text;
    msg.textContent = display;
    msg.dataset.mdSource = display;
  } else {
    setRenderedContent(msg, text);
  }
  if (role !== 'system') attachMessageActions(msg);
  container.appendChild(msg);
  updateWithdrawAffordance();
  container.scrollTop = container.scrollHeight;
}

function showSearchReadyMessageIfEmpty() {
  if (chatMode !== 'generate') return;
  const container = document.getElementById('chatMessages');
  if (!container) return;
  const messages = Array.from(container.querySelectorAll('.chat-msg'));
  const hasNonSystemMessage = messages.some(msg => !msg.classList.contains('system'));
  if (messages.length > 0 && hasNonSystemMessage) return;
  container.innerHTML = '';
  addChatMessage(SEARCH_READY_MESSAGE[currentLang] || SEARCH_READY_MESSAGE.en, 'system');
  const readyMsg = container.lastElementChild;
  if (readyMsg) readyMsg.dataset.searchReady = 'true';
}

function clearSearchReadyMessage() {
  document.querySelectorAll('#chatMessages .chat-msg.system[data-search-ready="true"]')
    .forEach(msg => msg.remove());
}

function addAgentSummaryMessage(summary, rawOutput) {
  const container = document.getElementById('chatMessages');
  const msg = document.createElement('div');
  msg.className = 'chat-msg agent';

  const summaryDiv = document.createElement('div');
  summaryDiv.className = 'agent-summary';
  setRenderedContent(summaryDiv, summary);   // Markdown + math; raw output below stays plain
  msg.appendChild(summaryDiv);

  // E6 — two copy options: the summary Markdown, and the full raw output.
  const bar = getMsgActions(msg);
  bar.appendChild(makeActionBtn(ICON_COPY, '复制 Summary', () => copyText(summaryDiv.dataset.mdSource), 'msg-copy'));
  if (rawOutput && rawOutput.length > 0) {
    bar.appendChild(makeActionBtn(ICON_COPY_RAW, '复制原始全文', () => copyText(rawOutput), 'msg-copy-raw'));
  }

  if (rawOutput && rawOutput.length > 0) {
    const toggleBtn = document.createElement('button');
    toggleBtn.className = 'btn btn-sm raw-output-toggle';
    toggleBtn.textContent = 'Show full output';
    toggleBtn.onclick = function() {
      const rawDiv = this.nextElementSibling;
      if (rawDiv.style.display === 'none') {
        rawDiv.style.display = 'block';
        this.textContent = 'Hide full output';
      } else {
        rawDiv.style.display = 'none';
        this.textContent = 'Show full output';
      }
    };
    msg.appendChild(toggleBtn);

    const rawDiv = document.createElement('div');
    rawDiv.className = 'raw-output';
    rawDiv.style.display = 'none';
    rawDiv.textContent = rawOutput;
    msg.appendChild(rawDiv);
  }

  container.appendChild(msg);
  container.scrollTop = container.scrollHeight;
}

// Display name for a chapter — drop the .html/.draft.html extension. The backend
// answers from the .md source, so showing the bare stem avoids implying we parse
